    <script>
        const base64Data = document.getElementById("bot-memory-base64").value;
        const decodedData = decodeURIComponent(escape(atob(base64Data)));
        const botMemoryData = JSON.parse(decodedData);
        console.log("Bộ Não BOT:", botMemoryData);
        console.log("Số bài học:", Object.keys(botMemoryData.botMoves || {}).length);
        // Hỗ trợ cả cấu trúc cũ (leaderboard) và mới (rankData)
        let rankCount = 0;
        if (botMemoryData.rankData) {
            for (const key in botMemoryData.rankData) {
                if (Array.isArray(botMemoryData.rankData[key])) {
                    rankCount += botMemoryData.rankData[key].length;
                }
            }
        } else if (botMemoryData.leaderboard) {
            rankCount = botMemoryData.leaderboard.length;
        }
        console.log("Số entry BXH:", rankCount);
    </script>
