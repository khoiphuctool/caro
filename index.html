    <h1 id="game-title">Caro BOT M2 PRO</h1>
    
    <div class="control-wrapper">

            <div class="config-group" id="group-piece" style="display:none;">
                <label for="player-piece">♟️ Bạn chọn:</label>

                <button onclick="document.getElementById('import-bot-memory').click()" style="padding:6px 12px;border-radius:6px;border:1px solid #cbd5e1;background:#f1f5f9;cursor:pointer;font-size:0.8rem;font-weight:bold;">📥 Nạp File BỘ NÃO</button>
                <input type="file" id="import-bot-memory" accept=".html,.json" style="display:none;" onchange="importBotMemory(this)">
            </div>
            <div class="config-group">
                <button onclick="startAutoplay()" id="btn-autoplay" style="padding:6px 12px;border-radius:6px;border:1px solid #10b981;background:#d1fae5;color:#065f46;cursor:pointer;font-size:0.8rem;font-weight:bold;">🤖 AUTOPLAY (Bot Tự Học)</button>

<script>
    // ===== API CONFIG =====
    // Đổi thành URL server thật khi deploy, ví dụ: 'https://your-server.com'
    // Để trống ('') nếu chỉ dùng localStorage (offline)
    const API_URL = '';

    async function apiGet(path) {
        if (!API_URL) return null;
        try { return await (await fetch(API_URL + path)).json(); }
        catch(e) { console.warn('API offline:', e); return null; }
    }
    async function apiPost(path, body) {
        if (!API_URL) return null;

    // ===== TRANSPOSITION TABLE (Cache kết quả Minimax) =====
    const TT_SIZE = 100000; // Số entry tối đa trong bảng
    const transpositionTable = new Map();
    let ttHits = 0, ttMisses = 0;

    function generateBoardHash() {
        // Tạo hash đơn giản từ trạng thái bàn cờ
        let hash = 0;
        if (isInfinite) {
            for (const [key, val] of infiniteMap.entries()) {
                const [r, c] = key.split(',').map(Number);
                hash = ((hash << 5) - hash) + (r * 1000 + c) * (val === 'X' ? 1 : 2);
                hash = hash & hash; // Convert to 32bit integer
            }
        } else {
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (boardState[r][c] !== '') {
                        hash = ((hash << 5) - hash) + (r * 1000 + c) * (boardState[r][c] === 'X' ? 1 : 2);
                        hash = hash & hash;
                    }
                }
            }
        }
        return Math.abs(hash);
    }

    function ttLookup(hash, depth, alpha, beta) {
        const entry = transpositionTable.get(hash);
        if (entry && entry.depth >= depth) {
            ttHits++;
            if (entry.flag === 'exact') return entry.value;
            if (entry.flag === 'lower' && entry.value >= alpha) return entry.value;
            if (entry.flag === 'upper' && entry.value <= beta) return entry.value;
        }
        ttMisses++;
        return null;
    }

    function ttStore(hash, depth, value, flag) {
        if (transpositionTable.size >= TT_SIZE) {
            // Xóa entry cũ nhất (FIFO đơn giản)
            const firstKey = transpositionTable.keys().next().value;
            transpositionTable.delete(firstKey);
        }
        transpositionTable.set(hash, { depth, value, flag });
    }

    function clearTranspositionTable() {
        transpositionTable.clear();
        ttHits = 0;
        ttMisses = 0;
    }

    // ===== KILLER HEURISTIC (Nhớ nước tốt) =====
    const killerMoves = []; // killerMoves[depth] = [{r, c}, ...]
    const MAX_KILLER_DEPTH = 20;

    function addKillerMove(depth, r, c) {
        if (depth < MAX_KILLER_DEPTH) {
            if (!killerMoves[depth]) killerMoves[depth] = [];
            // Thêm vào đầu, loại bỏ trùng
            const exists = killerMoves[depth].some(m => m.r === r && m.c === c);
            if (!exists) {
                killerMoves[depth].unshift({ r, c });
                if (killerMoves[depth].length > 2) killerMoves[depth].pop();
            }
        }
    }

    function isKillerMove(depth, r, c) {
        if (depth < MAX_KILLER_DEPTH && killerMoves[depth]) {
            return killerMoves[depth].some(m => m.r === r && m.c === c);
        }
        return false;
    }

    function clearKillerMoves() {
        for (let i = 0; i < MAX_KILLER_DEPTH; i++) {
            killerMoves[i] = [];
        }
    }

    // ===== LEADERBOARD MERGE FUNCTION =====
    function mergeLeaderboard(importedLeaderboard, localLeaderboard) {
        // importedLeaderboard: BXH lấy từ file não mới nạp (ưu tiên)
        // localLeaderboard: BXH hiện tại trên máy
        
        // Sử dụng một Map để dễ dàng gộp theo Tên người chơi
        const mergedMap = new Map();

        // 1. Đưa dữ liệu từ file não vào Map trước (ưu tiên)
        importedLeaderboard.forEach(player => {
            mergedMap.set(player.name.trim().toLowerCase(), { ...player });
        });

        // 2. Gộp dữ liệu hiện tại trên máy vào
        localLeaderboard.forEach(localPlayer => {
            const key = localPlayer.name.trim().toLowerCase();
            if (mergedMap.has(key)) {
                // Nếu trùng tên: Giữ entry có score cao hơn
                const existing = mergedMap.get(key);
                if (localPlayer.score > existing.score) {
                    mergedMap.set(key, { ...localPlayer });
                }
            } else {
                // Tên mới: thêm vào
                mergedMap.set(key, { ...localPlayer });
            }
        });

        // 3. Chuyển Map thành mảng và sắp xếp lại từ cao xuống thấp theo Điểm số (score)
        const finalLeaderboard = Array.from(mergedMap.values());
        finalLeaderboard.sort((a, b) => b.score - a.score);

        return finalLeaderboard;
    }

    // ===== HELPER FUNCTIONS - CONVERT RANKDATA <-> LEADERBOARD =====
    
    // Chuyển từ rankData (format mới) sang leaderboard (format cũ)
    function convertRankDataToLeaderboard(rankData) {
        const leaderboard = [];
        for (const [key, entries] of Object.entries(rankData)) {
            if (Array.isArray(entries)) {
                entries.forEach(entry => {
                    const wins = entry.wins || 1;
                    const score = entry.score || 0;
                    const existingPlayer = leaderboard.find(p => p.name === entry.name);
                    if (existingPlayer) {
                        existingPlayer.wins += wins;
                        existingPlayer.score += score;
                    } else {
                        leaderboard.push({
                            name: entry.name,
                            wins: wins,
                            score: score
                        });
                    }
                });
            }
        }
        return leaderboard;
    }

    // Chuyển từ leaderboard (format cũ) sang rankData (format mới)
    function convertLeaderboardToRankData(leaderboard, defaultKey) {
        const rankData = {};
        for (const player of leaderboard) {
            if (!rankData[defaultKey]) {
                rankData[defaultKey] = [];
            }
            rankData[defaultKey].push({
                name: player.name,
                wins: player.wins,
                score: player.score,
                moves: 0,
                totalTime: '00:00',
                date: new Date().toLocaleDateString('vi-VN'),
                time: new Date().toLocaleTimeString('vi-VN')
            });
        }
        return rankData;
    }

    // Merge rankData với lọc trùng theo tên (dùng Map)
    function mergeRankDataWithDedup(importedRankData, localRank) {
        for (const [key, importedEntries] of Object.entries(importedRankData)) {
            if (!Array.isArray(importedEntries)) continue;
            
            if (!localRank[key]) {
                localRank[key] = [];
            }
            
            // Dùng Map để lọc trùng theo tên trong cùng key
            const mergedMap = new Map();
            
            // Đưa entries từ file não vào Map trước (ưu tiên)
            importedEntries.forEach(entry => {
                mergedMap.set(entry.name.trim().toLowerCase(), { ...entry });
            });
            
            // Gộp entries hiện tại từ localStorage
            localRank[key].forEach(localEntry => {
                const nameKey = localEntry.name.trim().toLowerCase();
                if (mergedMap.has(nameKey)) {
                    // Trùng tên: Giữ entry có score cao hơn
                    const existing = mergedMap.get(nameKey);
                    if (localEntry.score > existing.score) {
                        mergedMap.set(nameKey, { ...localEntry });
                    }
                } else {
                    // Tên mới: thêm vào
                    mergedMap.set(nameKey, { ...localEntry });
                }
            });
            
            // Chuyển Map thành mảng, sắp xếp và giới hạn
            localRank[key] = Array.from(mergedMap.values());
            localRank[key].sort((a, b) => b.score - a.score);
            localRank[key] = localRank[key].slice(0, 50);
        }
        return localRank;
    }

    // Tính tổng số entry trong rankData
    function countRankDataEntries(rankData) {
        let total = 0;
        for (const [key, entries] of Object.entries(rankData)) {
            if (Array.isArray(entries)) {
                total += entries.length;
            }
        }
        return total;
    }

    // Import bot memory from HTML file or JSON file (portable backup restore)
    function importBotMemory(input) {
        const file = input.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const fileContent = e.target.result;
                let importedData = null;
                let sourceType = '';

                // Kiểm tra file type dựa trên extension
                const fileName = file.name.toLowerCase();
                
                if (fileName.endsWith('.json')) {
                    // File JSON thuần - format mới
                    try {
                        importedData = JSON.parse(fileContent);
                        sourceType = 'JSON file';
                        console.log('Đọc JSON file thành công');
                    } catch (e) {
                        console.log('Không thể parse JSON file:', e);
                        throw new Error('File JSON không hợp lệ');
                    }
                } else {
                    // File HTML - quét tìm JSON trong file HTML
                    // Cách 1: Tìm trong script tag với biến botMemoryData (JSON thuần - format mới)
                    const scriptMatch = fileContent.match(/const botMemoryData\s*=\s*({[\s\S]*?});/);
                    if (scriptMatch) {
                        try {
                            importedData = JSON.parse(scriptMatch[1]);
                            sourceType = 'HTML script';
                            console.log('Đọc JSON thuần từ HTML thành công');
                        } catch (e) {
                            console.log('Không thể parse JSON thuần từ HTML:', e);
                        }
                    }
                    
                    // Cách 2: Tìm trong hidden input base64 (format cũ - tương thích)
                    if (!importedData) {
                        const inputMatch = fileContent.match(/<input[^>]*id="bot-memory-base64"[^>]*value="([^"]*)"/);
                        if (inputMatch) {
                            try {
                                const base64Data = inputMatch[1];
                                const decodedData = decodeURIComponent(escape(atob(base64Data)));
                                importedData = JSON.parse(decodedData);
                                sourceType = 'HTML base64';
                                console.log('Đọc base64 thành công (format cũ)');
                            } catch (e) {
                                console.log('Không thể decode base64 từ hidden input');
                            }
                        }
                    }
                    
                    // Cách 3: Tìm trong pre tag (format rất cũ)
                    if (!importedData) {
                        const preMatch = fileContent.match(/<pre[^>]*id="bot-memory-data"[^>]*>([\s\S]*?)<\/pre>/);
                        if (preMatch) {
                            importedData = JSON.parse(preMatch[1].trim());
                            sourceType = 'HTML pre';
                        }
                    }
                }

                if (!importedData || typeof importedData !== 'object') {
                    throw new Error('Định dạng file không hợp lệ');
                }

                // 2. TÁCH BIỆT VÀ GỘP DỮ LIỆU
                let importedMoves = {};
                let importedRankData = null;
                let importedLeaderboard = [];

                // Kiểm tra cấu trúc file
                if (importedData.rankData) {
                    // Cấu trúc mới: có rankData nguyên cấu trúc
                    importedMoves = importedData.botMoves || {};
                    importedRankData = importedData.rankData;
                } else if (importedData.leaderboard) {
                    // Cấu trúc cũ: có leaderboard đơn giản
                    importedMoves = importedData.botMoves || {};
                    importedLeaderboard = importedData.leaderboard || [];
                } else {
                    // File kiểu cũ chỉ chứa mỗi nước đi
                    importedMoves = importedData;
                }

                // Gộp nước đi BOT (Không mất cái cũ)
                botDefeatMemory = { ...botDefeatMemory, ...importedMoves };
                localStorage.setItem(BOT_DEFEAT_MEMORY_KEY, JSON.stringify(botDefeatMemory));

                // GỘP BẢNG XẾP HẠNG - Ưu tiên file não (dữ liệu mới nhất)
                let totalRankEntries = 0;
                
                if (importedRankData) {
                    const localRank = loadRank();
                    // Ưu tiên entry từ file não khi trùng tên (giữ score cao hơn)
                    const mergedRank = mergeRankDataWithDedup(importedRankData, localRank);
                    
                    totalRankEntries = countRankDataEntries(mergedRank);
                    saveRank(mergedRank);
                    renderRankPanel();
                    console.log(`✅ Đã gộp BXH: ưu tiên dữ liệu từ file não, tổng ${totalRankEntries} entry`);
                } else if (importedLeaderboard.length > 0) {
                    const localRank = loadRank();
                    const localLeaderboard = convertRankDataToLeaderboard(localRank);
                    
                    // Ưu tiên leaderboard từ file khi trùng tên
                    const finalLeaderboard = mergeLeaderboard(importedLeaderboard, localLeaderboard);
                    
                    const defaultKey = 'ai-god|5q|♾️ Vô Hạn';
                    const newRankData = convertLeaderboardToRankData(finalLeaderboard, defaultKey);
                    
                    saveRank(newRankData);
                    renderRankPanel();
                    totalRankEntries = importedLeaderboard.length;
                    console.log(`✅ Đã gộp BXH (format cũ): ưu tiên dữ liệu từ file não`);
                }

                alert(`🎉 Nạp thành công!\n🧠 Đã học thêm ${Object.keys(importedMoves).length} bài học\n📊 Đã cập nhật ${totalRankEntries} entry BXH (ưu tiên file não)`);
                
            } catch (err) {
                alert('Lỗi: File không hợp lệ hoặc không chứa dữ liệu tương thích!');
                console.error(err);
            }
            input.value = ''; // Reset input
        };
        reader.readAsText(file);
    }

        if (hp) hp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // ===== LOSS STREAK TRACKING =====
        if (gameMode.startsWith('ai')) {
            if (result === 'lose') {
                // Người chơi thua - tăng chuỗi thua
                lossStreak++;
                localStorage.setItem(LOSS_STREAK_KEY, lossStreak);
                
                // Cập nhật kỷ lục nếu cần
                if (lossStreak > lossStreakRecord) {
                    lossStreakRecord = lossStreak;
                    localStorage.setItem(LOSS_STREAK_RECORD_KEY, lossStreakRecord);
                }
            } else if (result === 'win') {
                // Người chơi thắng - kiểm tra xem có phá kỷ lục không
                if (lossStreak > 0) {
                    const brokenRecord = lossStreak > lossStreakRecord && lossStreak > 1;
                    // Reset chuỗi thua
                    lossStreak = 0;
                    localStorage.setItem(LOSS_STREAK_KEY, lossStreak);
                    
                    if (brokenRecord) {
                        // Chúc mừng phá kỷ lục thua liên tiếp

                        }, 1000);
                    }
                }
            }
        }
    }

    const DIFFICULTY_MULTIPLIERS = {
        'solo': 0.5,
        'ai-easy': 1,
        'ai-medium': 1.5,
        'ai-hard': 2,
        'ai-god': 3
    };

    // Hệ số quân thắng
    const WIN_COUNT_MULTIPLIERS = {
        3: 0.5,
        4: 0.7,
        5: 1,
        6: 1.3,
        7: 1.6,
        8: 2,
        9: 2.5,
        10: 3

    function calculateScore(moves, mode, winCount, dangerScore, totalTime) {
        const baseScore = 5000;
        const timePenalty = totalTime * 5; // trừ điểm theo thời gian (tăng lên)
        const difficultyMultiplier = DIFFICULTY_MULTIPLIERS[mode] || 1;
        const winCountMultiplier = WIN_COUNT_MULTIPLIERS[winCount] || 1;
        
        // Điểm độ nguy hiểm: giảm hệ số để không quá quan trọng
        const dangerBonus = dangerScore * 10;
        
        // Giới hạn dangerBonus tối đa là 1000 điểm
        const cappedDangerBonus = Math.min(dangerBonus, 1000);
        
        const score = Math.round((baseScore + cappedDangerBonus - timePenalty) * difficultyMultiplier * winCountMultiplier);
        return Math.max(0, score); // Đảm bảo điểm không âm
    }

    const RANK_KEY = 'caro_rank_v2';

    function loadRank() {
        try {
            const data = JSON.parse(localStorage.getItem(RANK_KEY)) || {};
            // Migrate dữ liệu cũ từ v1 sang v2 (tính điểm từ moves)
            const migrated = {};
            for (const [k, v] of Object.entries(data)) {
                if (k.includes('|')) {
                    // Dữ liệu mới format v2
                    migrated[k] = v;
                }
            }
            // Thử migrate từ v1 nếu không có dữ liệu
            if (Object.keys(migrated).length === 0) {
                try {
                    const oldData = JSON.parse(localStorage.getItem('caro_rank_v1')) || {};
                    for (const [k, entries] of Object.entries(oldData)) {
                        if (!k.includes('|')) continue;
                        const { mode, winCnt } = parseRankKey(k);
                        migrated[k] = entries.map(e => ({
                            ...e,
                            score: calculateScore(e.moves, mode, winCnt, 0, 0) // dangerScore=0, totalTime=0 cho dữ liệu cũ
                        })).sort((a, b) => b.score - a.score).slice(0, 20);
                    }
                    if (Object.keys(migrated).length > 0) {
                        saveRank(migrated);
                        localStorage.removeItem('caro_rank_v1'); // Xóa dữ liệu cũ sau khi migrate
                    }
                } catch(e) {}
            }
            return migrated;
        }
        catch(e) { return {}; }
    }
    function saveRank(data) {
        localStorage.setItem(RANK_KEY, JSON.stringify(data));
    }

    // key = "mode|winCnt q|boardLabel"  vd: "ai-god|5q|15×15"
    function getRankKey(mode, winCnt, boardLabel) {
        return `${mode}|${winCnt}q|${boardLabel}`;
    }

    function parseRankKey(k) {
        const [mode, qPart, boardLabel] = k.split('|');
        return { mode, winCnt: parseInt(qPart), boardLabel };
    }

    // Lấy danh sách chế độ có dữ liệu
    function getRankModes() {
        const data = loadRank();
        const modes = [...new Set(Object.keys(data).map(k => parseRankKey(k).mode))];
        // Sắp theo thứ tự cố định
        const order = ['solo','ai-easy','ai-medium','ai-hard','ai-god'];
        return modes.sort((a, b) => order.indexOf(a) - order.indexOf(b));
    }

    // Lấy danh sách sub-key (winCnt|board) trong 1 mode
    function getRankSubKeys(mode) {
        const data = loadRank();
        return Object.keys(data)
            .filter(k => k.startsWith(mode + '|'))
            .sort((a, b) => {
                const pa = parseRankKey(a), pb = parseRankKey(b);
                return pa.winCnt !== pb.winCnt ? pa.winCnt - pb.winCnt : a.localeCompare(b);
            });
    }

            ${subKeys.length > 1 ? `<div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center">${subTabsHtml}</div>` : ''}

                <span class="rank-meta">${e.moves || ''} ${e.moves ? 'nước' : ''} · ${e.totalTime || '--:--'} · ${e.date || '--/--/--'} · ${e.time || '--:--:--'}</span>
                ${e.moveHistory && e.moveHistory.length > 0 ? `<button onclick="loadRankHistory(${i})" style="margin-left:8px;padding:2px 8px;font-size:0.75rem;border-radius:4px;border:1px solid #444;background:#222;color:#fff;cursor:pointer;">📺 Xem lại</button>` : ''}

    function switchRankTab(key) {

    function loadRankHistory(index) {
        const data = loadRank();
        if (!currentRankTab || !data[currentRankTab]) return;
        const entry = data[currentRankTab][index];
        if (!entry || !entry.moveHistory || entry.moveHistory.length === 0) {
            alert('Không có lịch sử trận đấu này!');
            return;
        }

        // Đóng bảng xếp hạng
        document.getElementById('rank-panel').classList.remove('show');

        // Khởi tạo lại game với cùng cấu hình
        const { winCnt, boardLabel } = parseRankKey(currentRankTab);
        initGameWithConfig(winCnt, boardLabel);

        // Load lịch sử nước đi
        moveHistory = [...entry.moveHistory];
        
        // Hiển thị trạng thái xem lại
        const lessonCount = Object.keys(botDefeatMemory).length;
        const lessonPanel = getDOM('lesson-panel');
        if (lessonPanel) {
            lessonPanel.textContent = `🧠 ${lessonCount}`;
        }
        statusPanel.innerHTML = `📺 Đang xem lại trận đấu · ${entry.name} · ${entry.score.toLocaleString('vi-VN')} điểm &nbsp;|&nbsp; <button onclick="closeHistoryView()" style="padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:bold;font-size:0.85rem;background:#dc2626;color:#fff;">❌ Đóng</button>`;

        // Render lại bàn cờ với lịch sử
        renderBoardFromHistory();
    }

    function renderBoardFromHistory() {
        // Reset bàn cờ
        if (isInfinite) {
            infiniteMap.clear();
        } else {
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    boardState[r][c] = "";
                }
            }
        }

        // Replay từng nước đi
        for (const move of moveHistory) {
            const { r, c, player } = move;
            if (isInfinite) {
                infiniteMap.set(`${r},${c}`, player);
            } else {
                if (r >= 0 && r < boardSize && c >= 0 && c < boardSize) {
                    boardState[r][c] = player;
                }
            }
        }

        // Render bàn cờ
        if (isInfinite) {
            renderInfiniteBoard();
        } else {
            renderBoard();
        }

        // Nếu có vô hạn, căn chỉnh camera đến trung tâm
        if (isInfinite && moveHistory.length > 0) {
            const lastMove = moveHistory[moveHistory.length - 1];
            vRowF = lastMove.r - (infCanvasH / INF_CS) / 2;
            vColF = lastMove.c - (infCanvasW / INF_CS) / 2;
            renderInfiniteBoard();
        }
    }

        else if (boardLabel.includes('20x20')) size = 20;
        else if (boardLabel.includes('25x25')) size = 25;
        
        boardSize = size;
        winCount = winCount;
        isInfinite = boardLabel.includes('Vô hạn');
        
        initGame();
    }

    function promptRankName(moves, mode, winCnt, boardLabel, winnerLabel, dangerScore, totalTime) {
        const score = calculateScore(moves, mode, winCnt, dangerScore, totalTime);
        const now = new Date();
        const dateStr = now.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'2-digit' });

        const totalTimeStr = `${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
        
        pendingRankEntry = { moves, mode, winCnt, boardLabel, score, dangerScore, totalTime, date: dateStr, time: timeStr };
        
        // Hiện overlay nhập tên cho cả chế độ BOT và solo
        // Người chơi có thể nhập tên để lưu vào BXH
        const sub = document.getElementById('name-overlay-sub');
        if (sub) sub.innerHTML = `🏅 ${score.toLocaleString('vi-VN')} điểm<br><span style="opacity:0.7;font-size:0.85rem">${winnerLabel} · ${MODE_LABELS[mode] || mode} · ${winCnt} quân · ${boardLabel} · ${moves} nước · ${totalTimeStr} · ${dateStr} · ${timeStr}</span>`;
        const inp = document.getElementById('name-input');
        if (inp) inp.value = '';
        document.getElementById('name-overlay').classList.add('show');
        setTimeout(() => inp && inp.focus(), 100);

    function saveRankEntry() {
        const inp = document.getElementById('name-input');
        const name = (inp ? inp.value.trim() : '') || 'Ẩn Danh';
        if (!pendingRankEntry) { closeNameOverlay(); return; }
        const { moves, mode, winCnt, boardLabel, score, dangerScore, totalTime, date, time } = pendingRankEntry;
        const data = loadRank();
        const key = getRankKey(mode, winCnt, boardLabel);
        if (!data[key]) data[key] = [];
        const totalTimeStr = `${Math.floor(totalTime/60)}:${(totalTime%60).toString().padStart(2,'0')}`;
        // Lưu moveHistory để có thể xem lại
        data[key].push({ name, score, moves, date, time, totalTime: totalTimeStr, dangerScore, moveHistory: [...moveHistory] });
        data[key].sort((a, b) => b.score - a.score); // Sắp xếp theo điểm giảm dần
        data[key] = data[key].slice(0, 50);
        saveRank(data);
        currentRankMode = mode;
        currentRankTab  = key;
        pendingRankEntry = null;
        closeNameOverlay();
        renderRankPanel();
        // Sync lên server
        apiPost('/api/rank', { key, name, score, moves, date, time, totalTime: totalTimeStr, dangerScore, moveHistory });
        const rp = document.getElementById('rank-panel');
        if (rp) setTimeout(() => rp.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 200);
    }

    function setupPanelResize() {
        const handles = document.querySelectorAll('.resize-handle');
        
        handles.forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const panel = handle.closest('#history-panel, #rank-panel');
                if (!panel) return;
                
                const panelType = handle.getAttribute('data-panel');
                const startX = e.clientX;
                const startWidth = panel.offsetWidth;

                    const newWidth = Math.max(100, Math.min(500, startWidth + dx));
                    panel.style.width = newWidth + 'px';

                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    
                    // Lưu kích thước
                    const sizes = loadPanelSizes();
                    sizes[panelType] = panel.offsetWidth;
                    savePanelSizes(sizes);
                }
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        });
    }

        isGameActive      = true;
        lastMoveCell      = null;
        lastMoveR         = null;
        lastMoveC         = null;
        winningCellCoords = [];
        moveCount         = 0;
        moveHistory       = []; // Reset undo history

        keyboardCursorC   = 0;

        infHoverR = null; infHoverC = null;
        renderInfiniteBoard();
