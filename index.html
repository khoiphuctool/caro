        // Tọa độ thực tại con trỏ trước khi zoom
        const worldR = vRowF + my / INF_CS;
        const worldC = vColF + mx / INF_CS;

        // Tính cell size mới
        const factor = e.deltaY < 0 ? 1.15 : (1 / 1.15);
        const newCS = Math.min(INF_CS_MAX, Math.max(INF_CS_MIN, INF_CS * factor));
        INF_CS = Math.round(newCS);

        // Điều chỉnh viewport để giữ điểm dưới con trỏ cố định
        vRowF = worldR - my / INF_CS;
        vColF = worldC - mx / INF_CS;

        saveZoom();
        renderInfiniteBoard();
    }

    function zoomBoard(direction) {
        // direction: 1 = zoom in, -1 = zoom out
        const factor = direction > 0 ? 1.15 : (1 / 1.15);
        const newCS = Math.min(INF_CS_MAX, Math.max(INF_CS_MIN, INF_CS * factor));
        
        if (newCS === INF_CS) return; // Không thay đổi nếu đã đạt giới hạn
        
        // Zoom vào giữa canvas
        const mx = infCanvasW / 2;
        const my = infCanvasH / 2;
        const worldR = vRowF + my / INF_CS;
        const worldC = vColF + mx / INF_CS;
        
        INF_CS = Math.round(newCS);
        
        // Điều chỉnh viewport để giữ điểm giữa cố định
        vRowF = worldR - my / INF_CS;
        vColF = worldC - mx / INF_CS;
        
        saveZoom();
        renderInfiniteBoard();
    }

    function undoMove() {
        if (moveHistory.length === 0) return; // Không có nước đi để undo
        if (!isGameActive) return; // Game đã kết thúc
        
        // Lấy nước đi cuối cùng
        const lastMove = moveHistory.pop();
        
        // Xóa quân khỏi bàn
        setCell(lastMove.r, lastMove.c, "");
        
        // Giảm moveCount
        moveCount--;
        
        // Đổi lượt về người chơi vừa đánh
        currentPlayer = lastMove.player;
        
        // Cập nhật lastMoveR, lastMoveC
        if (moveHistory.length > 0) {
            const prevMove = moveHistory[moveHistory.length - 1];
            lastMoveR = prevMove.r;
            lastMoveC = prevMove.c;
        } else {
            lastMoveR = null;
            lastMoveC = null;
        }
        
        // Xóa winning cells nếu có
        winningCellCoords = [];
        
        // Render lại
        if (isInfinite) {
            renderInfiniteBoard();
        } else {
            if (lastMoveCell) lastMoveCell.classList.remove('last-move');
            const cell = document.querySelector(`[data-row='${lastMove.r}'][data-col='${lastMove.c}']`);
            if (cell) {
                cell.classList.remove(lastMove.player);
                cell.classList.remove('last-move');
            }
            // Cập nhật last-move cho nước đi trước đó
            if (moveHistory.length > 0) {
                const prevMove = moveHistory[moveHistory.length - 1];
                const prevCell = document.querySelector(`[data-row='${prevMove.r}'][data-col='${prevMove.c}']`);
                if (prevCell) {
                    prevCell.classList.add('last-move');
                    lastMoveCell = prevCell;
                }
            }
        }
        
        updateCursorByTurn();
        updateStatus();
    }

    function jumpToCenter() {
        if (lastMoveR !== null) {
            vRowF = lastMoveR - Math.floor(infCanvasH / INF_CS / 2);
            vColF = lastMoveC - Math.floor(infCanvasW / INF_CS / 2);
        } else {
            vRowF = -Math.floor(infCanvasH / INF_CS / 2);
            vColF = -Math.floor(infCanvasW / INF_CS / 2);
        }
        renderInfiniteBoard();
    }

    function jumpToOrigin() {
        vRowF = -Math.floor(infCanvasH / INF_CS / 2);
        vColF = -Math.floor(infCanvasW / INF_CS / 2);
        renderInfiniteBoard();
    }

    // Tạo 1 ô DOM
    function makeCell(r, c) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.setAttribute('data-row', r);
        cell.setAttribute('data-col', c);
        cell.addEventListener('click', handleCellClick);
        return cell;
    }

    function updateStatus() {
        if (!isGameActive) return;

        if (gameMode.startsWith('ai') && currentPlayer === botPiece) {
            statusPanel.innerHTML = `🤖 Siêu Não AI đang phong tỏa các hướng đi...`;
        } else {
            statusPanel.innerHTML = `Lượt của bạn: <span class="turn-${currentPlayer}">${currentPlayer}</span>`;
        }
    }

    let isDragging = false, panMoved = false;

    function handleCellClick(e) {
        if (panMoved) return;
        if (!isGameActive) return;
        // Chặn click khi đến lượt bot
        if (gameMode.startsWith('ai') && currentPlayer === botPiece) return;
        let target = e.target;
        if (!target.classList.contains('cell')) target = target.parentElement;
        const r = parseInt(target.getAttribute('data-row'));
        const c = parseInt(target.getAttribute('data-col'));
        if (getCell(r, c) !== "") return;
        makeMove(r, c);
    }

    // ===== GETTER/SETTER thống nhất cho cả 2 chế độ =====
    function getCell(r, c) {
        if (isInfinite) return infiniteMap.get(`${r},${c}`) || "";
        if (r < 0 || r >= boardSize || c < 0 || c >= boardSize) return "W"; // wall
        return boardState[r][c];
    }
    function setCell(r, c, val) {
        if (isInfinite) {
            if (val === "") infiniteMap.delete(`${r},${c}`);
            else infiniteMap.set(`${r},${c}`, val);
        } else {
            boardState[r][c] = val;
        }
    }

    function makeMove(r, c) {
        moveCount++;
        setCell(r, c, currentPlayer);
        
        // Lưu nước đi vào history để undo
        moveHistory.push({ r, c, player: currentPlayer });
        
        // Cập nhật keyboard cursor về vị trí quân vừa đánh
        keyboardCursorR = r;
        keyboardCursorC = c;
        keyboardCursorVisible = true;
        
        // Reset timer lượt đi người chơi sau khi đi
        if (playerTurnTimer) clearInterval(playerTurnTimer);
        
        updateCursorByTurn();

        // Lưu tọa độ thực nước đi cuối
        if (isInfinite) { lastMoveR = r; lastMoveC = c; }

        if (isInfinite) {
            // Canvas tự render lại — không cần expand DOM
            // Auto-center nếu quân vừa đánh ra ngoài 1/3 canvas
            const cols = infCanvasW / INF_CS;
            const rows = infCanvasH / INF_CS;
            const distR = Math.abs((r - vRowF) - rows / 2);
            const distC = Math.abs((c - vColF) - cols / 2);
            if (distR > rows * 0.35 || distC > cols * 0.35) {
                vRowF = r - rows / 2;
                vColF = c - cols / 2;
            }
            renderInfiniteBoard();
        } else {
            // Bàn cố định — update DOM trực tiếp
            if (lastMoveCell) lastMoveCell.classList.remove('last-move');
            let cell = document.querySelector(`[data-row='${r}'][data-col='${c}']`);
            if (cell) {
                cell.classList.add(currentPlayer);
                cell.classList.add('last-move');
                lastMoveCell = cell;
            }
        }

        if (checkWin(r, c)) {
            isGameActive = false;
            if (lastMoveCell) lastMoveCell.classList.remove('last-move');
            const isBotWin = gameMode.startsWith('ai') && currentPlayer === botPiece;
            const boardLabel = '♾️ Vô Hạn';

            // TỰ ĐỘNG HỌC HỎI KHI BOT THUA - ÁP DỤNG CHO TẤT CẢ CÁC CHẾ ĐỘ
            // Lưu theo cấu trúc phân biệt chế độ và winCount để tối ưu hóa
            if (!isBotWin && gameMode.startsWith('ai') && moveHistory.length > 0) {
                // Ghi nhận chuỗi nước đi ở giai đoạn cuối của BOT (3-5 nước đi cuối cùng)
                const botMovesToLearn = [];
                const maxMovesToLearn = 5;
                
                for (let i = moveHistory.length - 1; i >= 0 && botMovesToLearn.length < maxMovesToLearn; i--) {
                    if (moveHistory[i].player === botPiece) {
                        botMovesToLearn.push(moveHistory[i]);
                    }
                }
                
                // Lưu các nước đi vào bộ nhớ với key phân biệt theo chế độ và winCount
                let learnedCount = 0;
                for (const botMove of botMovesToLearn.reverse()) {
                    // Key mới: {mode}_{winCount}_r{row}c{col}
                    const memoryKey = `${gameMode}_${winCount}_r${botMove.r}c${botMove.c}`;
                    if (!botDefeatMemory[memoryKey]) {
                        botDefeatMemory[memoryKey] = true;
                        learnedCount++;
                        console.log(`🧠 BOT học nước đi mới: ${memoryKey} (tổng bài học: ${Object.keys(botDefeatMemory).length})`);
                    }
                }
                
                if (learnedCount > 0) {
                    localStorage.setItem(BOT_DEFEAT_MEMORY_KEY, JSON.stringify(botDefeatMemory));
                    console.log(`BOT đã học ${learnedCount} nước đi mới từ ván thua này`);
                }
            }

            if (gameMode === 'solo') {
                statusPanel.innerHTML = `🏆 Người <strong>${currentPlayer}</strong> chiến thắng!`;
                recordMatch('win', currentPlayer);
                setTimeout(() => {
                    showWinOverlay(currentPlayer, false, '', '');
                    // Dừng timer
                    if (gameTotalTimer) clearInterval(gameTotalTimer);
                    if (playerTurnTimer) clearInterval(playerTurnTimer);
                    // Ẩn timer panel
                    const timerPanel = document.getElementById('timer-panel');
                    if (timerPanel) timerPanel.style.display = 'none';
                    // Hỏi tên sau khi overlay hiện
                    setTimeout(() => promptRankName(moveCount, gameMode, winCount, boardLabel, `Người ${currentPlayer}`, playerDangerScore, gameTotalSeconds), 600);
                }, 500);
            } else {
                if (isBotWin) {
                    // BOT thắng - chế diễu theo chuỗi thua liên tiếp
                    let tauntMessage = '';
                    let tauntEmoji = '';
                    
                    if (lossStreak === 2) {
                        const taunts2 = [
                            'Thua 2 ván rồi! Cần luyện thêm nhé! 😅',
                            '2 ván liên tiếp! Bạn đang gặp khó khăn đấy! 🤔',
                            'Thua 2 lần! Đừng nản, cố lên! 😊'
                        ];
                        tauntMessage = taunts2[Math.floor(Math.random() * taunts2.length)];
                        tauntEmoji = '😅';
                    } else if (lossStreak === 3) {
                        const taunts3 = [
                            '3 ván liên tiếp! Gừng càng già càng cay! 🔥',
                            'Thua 3 ván! BOT đang lên hương đấy! 😎',
                            '3 lần thua! Bạn có muốn thử chế độ Dễ không? 🤭'
                        ];
                        tauntMessage = taunts3[Math.floor(Math.random() * taunts3.length)];
                        tauntEmoji = '😎';
                    } else if (lossStreak >= 4) {
                        const taunts4 = [
                            `${lossStreak} ván liên tiếp! Bạn đang tạo kỷ lục đấy! 🏆`,
                            `Thua ${lossStreak} ván! BOT TỐI THƯỢNG không thể bị đánh bại! 💀`,
                            `${lossStreak} lần! Có lẽ nên nghỉ ngơi một chút? 😂`,
                            `Kỷ lục ${lossStreak} ván! Bạn rất kiên trì! 🎖️`,
                            `${lossStreak} ván thua! BOT cảm thấy bất lực... vì bạn quá yếu! 😜`
                        ];
                        tauntMessage = taunts4[Math.floor(Math.random() * taunts4.length)];
                        tauntEmoji = '💀';
                    } else {
                        tauntMessage = 'Gừng càng già càng cay — bó tay thì gặp anh Chần!';
                        tauntEmoji = '💀';
                    }
                    
                    statusPanel.innerHTML = `💀 BOT TỐI THƯỢNG ĐÃ THẮNG! ${tauntMessage}`;
                    recordMatch('lose', botPiece); // SỬA: Bot thắng nên winner là botPiece
                    setTimeout(() => {
                        showWinOverlay(botPiece, true, tauntMessage, tauntEmoji); // SỬA: winner là botPiece
                        // Dừng timer
                        if (gameTotalTimer) clearInterval(gameTotalTimer);
                        if (playerTurnTimer) clearInterval(playerTurnTimer);
                        // Ẩn timer panel
                        const timerPanel = document.getElementById('timer-panel');
                        if (timerPanel) timerPanel.style.display = 'none';
                    }, 500);
                } else {
                    // Người chơi thắng
                    statusPanel.innerHTML = `🏆 KINH ĐIỂM! Bạn đã chiến thắng BOT của PRO PRO, bạn rất là kinh, bái phục`;
                    recordMatch('win', humanPiece); // SỬA: Người chơi thắng nên winner là humanPiece
                    setTimeout(() => {
                        // Dừng timer
                        if (gameTotalTimer) clearInterval(gameTotalTimer);
                        if (playerTurnTimer) clearInterval(playerTurnTimer);
                        // Ẩn timer panel
                        const timerPanel = document.getElementById('timer-panel');
                        if (timerPanel) timerPanel.style.display = 'none';
                        // Hỏi tên trước để tính điểm
                        promptRankName(moveCount, gameMode, winCount, boardLabel, `Người thắng Bot ${MODE_LABELS[gameMode]}`, playerDangerScore, gameTotalSeconds);
                        // Hiện overlay sau khi đã có điểm
                        setTimeout(() => showWinOverlay(humanPiece, false, '', ''), 100);
                    }, 500);
                }
            }
            return;
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";
        updateCursorByTurn();
        
        // Đánh giá nước đi của người chơi (chỉ khi chơi với bot)
        if (gameMode.startsWith('ai') && !isBotMove) {
            evaluatePlayerMove(r, c);
        }
        
        // Bắt đầu đếm lại timer lượt đi khi đến lượt người chơi
        if (isGameActive && gameMode.startsWith('ai') && currentPlayer === humanPiece) {
            startPlayerTurnTimer();
        }
        
        updateStatus();
        if (isGameActive && gameMode.startsWith('ai') && currentPlayer === botPiece) {
            // Delay theo độ khó: god=500ms, hard=300ms, medium=200ms
            const thinkTime = gameMode === 'ai-god' ? 500 : gameMode === 'ai-hard' ? 300 : 180;
            statusPanel.innerHTML = `🤖 <span style="opacity:0.7">Đang tính toán</span> <span class="think-dots">...</span>`;
            setTimeout(makeAIMove, thinkTime);
        }
    }

    function checkWin(r, c) {
        const directions = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        const player = getCell(r, c);
        const opp = player === "X" ? "O" : "X";
        const blockBothEndsEnabled = document.getElementById('block-both-ends').checked;
        
        for (let { dr, dc } of directions) {
            const cells = [[r, c]];
            let fwd = 0, bwd = 0;
            while (getCell(r+dr*(fwd+1), c+dc*(fwd+1)) === player) { fwd++; cells.push([r+dr*fwd, c+dc*fwd]); }
            while (getCell(r-dr*(bwd+1), c-dc*(bwd+1)) === player) { bwd++; cells.push([r-dr*bwd, c-dc*bwd]); }
            
            // Phải có ít nhất winCount quân
            if (cells.length < winCount) continue;
            
            // Kiểm tra luật chặn 2 đầu (áp dụng cho tất cả winCount khi bật)
            if (blockBothEndsEnabled) {
                // Tìm ô chặn ở đầu forward (tìm quân địch gần nhất)
                let headBlocked = false;
                let headDist = 1;
                while (!headBlocked && headDist <= 50) { // Tìm tối đa 50 ô
                    const headR = r + dr*(fwd+headDist), headC = c + dc*(fwd+headDist);
                    const cellVal = getCell(headR, headC);
                    if (cellVal === opp) {
                        headBlocked = true;
                        break;
                    } else if (cellVal === player) {
                        break; // Gặp quân cùng màu → không bị chặn
                    }
                    headDist++;
                }
                
                // Tìm ô chặn ở đầu backward (tìm quân địch gần nhất)
                let tailBlocked = false;
                let tailDist = 1;
                while (!tailBlocked && tailDist <= 50) { // Tìm tối đa 50 ô
                    const tailR = r - dr*(bwd+tailDist), tailC = c - dc*(tailDist+bwd);
                    const cellVal = getCell(tailR, tailC);
                    if (cellVal === opp) {
                        tailBlocked = true;
                        break;
                    } else if (cellVal === player) {
                        break; // Gặp quân cùng màu → không bị chặn
                    }
                    tailDist++;
                }
                
                // Nếu cả 2 đầu đều bị chặn bởi quân địch → không thắng
                if (headBlocked && tailBlocked) continue;
            }
            
            highlightWinners(cells);
            return true;
        }
        return false;
    }


    function isValid(r, c) {
        if (isInfinite) return true;
        return r >= 0 && r < boardSize && c >= 0 && c < boardSize;
    }

    // checkWinSilent: kiểm tra thắng không highlight DOM — dùng cho AI
    function checkWinSilent(r, c) {
        const directions = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        const player = getCell(r, c);
        const opp = player === "X" ? "O" : "X";
        const blockBothEndsEnabled = document.getElementById('block-both-ends').checked;
        
        for (let { dr, dc } of directions) {
            let fwd = 0, bwd = 0;
            while (getCell(r+dr*(fwd+1), c+dc*(fwd+1)) === player) fwd++;
            while (getCell(r-dr*(bwd+1), c-dc*(bwd+1)) === player) bwd++;
            const count = 1 + fwd + bwd;
            
            // Phải có ít nhất winCount quân
            if (count < winCount) continue;
            
            // Kiểm tra luật chặn 2 đầu (áp dụng cho tất cả winCount khi bật)
            if (blockBothEndsEnabled) {
                // Tìm ô chặn ở đầu forward (tìm quân địch gần nhất)
                let headBlocked = false;
                let headDist = 1;
                while (!headBlocked && headDist <= 50) { // Tìm tối đa 50 ô
                    const headR = r + dr*(fwd+headDist), headC = c + dc*(fwd+headDist);
                    const cellVal = getCell(headR, headC);
                    if (cellVal === opp) {
                        headBlocked = true;
                        break;
                    } else if (cellVal === player) {
                        break; // Gặp quân cùng màu → không bị chặn
                    }
                    headDist++;
                }
                
                // Tìm ô chặn ở đầu backward (tìm quân địch gần nhất)
                let tailBlocked = false;
                let tailDist = 1;
                while (!tailBlocked && tailDist <= 50) { // Tìm tối đa 50 ô
                    const tailR = r - dr*(bwd+tailDist), tailC = c - dc*(tailDist+bwd);
                    const cellVal = getCell(tailR, tailC);
                    if (cellVal === opp) {
                        tailBlocked = true;
                        break;
                    } else if (cellVal === player) {
                        break; // Gặp quân cùng màu → không bị chặn
                    }
                    tailDist++;
                }
                
                // Nếu cả 2 đầu đều bị chặn bởi quân địch → không thắng
                if (headBlocked && tailBlocked) continue;
            }
            
            return true;
        }
        return false;
    }

    function highlightWinners(winningCells) {
        if (isInfinite) winningCellCoords = winningCells.slice();
        winningCells.forEach(([r, c]) => {
            const cell = document.querySelector(`[data-row='${r}'][data-col='${c}']`);
            if (cell) cell.classList.add('winning-cell');
        });
    }

    function hasNeighbor(r, c, range) {
        for (let dr = -range; dr <= range; dr++) {
            for (let dc = -range; dc <= range; dc++) {
                if (dr === 0 && dc === 0) continue;
                if (getCell(r+dr, c+dc) !== "" && getCell(r+dr, c+dc) !== "W") return true;
            }
        }
        return false;
    }

    function getCandidates(range) {
        const result = [];
        if (isInfinite) {
            const checked = new Set();
            for (const key of infiniteMap.keys()) {
                const [r, c] = key.split(',').map(Number);
                for (let dr = -range; dr <= range; dr++) {
                    for (let dc = -range; dc <= range; dc++) {
                        const nr = r+dr, nc = c+dc;
                        const nk = `${nr},${nc}`;
                        if (!checked.has(nk) && !infiniteMap.has(nk)) {
                            checked.add(nk);
                            result.push({r: nr, c: nc});
                        }
                    }
                }
            }
            if (result.length === 0) result.push({r: 0, c: 0});
        } else {
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (boardState[r][c] === "" && hasNeighbor(r, c, range)) result.push({r, c});
                }
            }
            if (result.length === 0) result.push({r: Math.floor(boardSize/2), c: Math.floor(boardSize/2)});
        }
        return result;
    }

    function getActivityCenter() {
        if (isInfinite && infiniteMap.size > 0) {
            let sr = 0, sc = 0, n = 0;
            for (const key of infiniteMap.keys()) {
                const [r, c] = key.split(',').map(Number);
                sr += r; sc += c; n++;
            }
            return [Math.round(sr/n), Math.round(sc/n)];
        }
        return [Math.floor(boardSize/2), Math.floor(boardSize/2)];
    }

    // ===== OPENING BOOK =====
    const openingBook = {
        // Nước đầu: vào tâm
        'start': [
            { moves: [], move: [Math.floor(boardSize/2), Math.floor(boardSize/2)], weight: 10 }
        ],
        // Nước 2: quanh tâm
        'center': (() => {
            const mid = Math.floor(boardSize/2);
            return [
                { moves: [[mid,mid]], move: [mid-1, mid-1], weight: 8 },
                { moves: [[mid,mid]], move: [mid-1, mid+1], weight: 8 },
                { moves: [[mid,mid]], move: [mid+1, mid-1], weight: 8 },
                { moves: [[mid,mid]], move: [mid+1, mid+1], weight: 8 },
                { moves: [[mid,mid]], move: [mid-2, mid], weight: 4 },
                { moves: [[mid,mid]], move: [mid+2, mid], weight: 4 },
                { moves: [[mid,mid]], move: [mid, mid-2], weight: 4 },
                { moves: [[mid,mid]], move: [mid, mid+2], weight: 4 },
            ];
        })()
    };

    function getOpeningMove() {
        const moveCount = isInfinite ? infiniteMap.size : boardState.flat().filter(x=>x!=="").length;
        if (moveCount > 4) return null;
        
        const book = moveCount === 0 ? openingBook.start : openingBook.center;
        if (!book || book.length === 0) return null;

        const totalW = book.reduce((s, x) => s + x.weight, 0);
        let rand = Math.random() * totalW;
        for (const entry of book) {
            rand -= entry.weight;
            if (rand <= 0) {
                const cell = entry.move;
                if (isInfinite) {
                    if (!infiniteMap.has(`${cell[0]},${cell[1]}`)) return {r: cell[0], c: cell[1]};
                } else {
                    if (boardState[cell[0]] && boardState[cell[0]][cell[1]] === "") return {r: cell[0], c: cell[1]};
                }
            }
        }
        return null;
    }

    function makeAIMove() {
        if (!isGameActive) return;
        isBotMove = true;
        const move = getBotMove();
        if (move) makeMove(move.r, move.c);
        isBotMove = false;
    }

    // ===== ENGINE AI CORE (MỨC ĐỘ KHÓ KHÁC NHAU) =====
    const TL = { FIVE: 5, FOUR_OPEN: 4.5, FOUR_BLOCKED: 4, THREE_OPEN: 3.5, THREE_BLOCKED: 3, TWO_OPEN: 2.5, TWO_BLOCKED: 2, NONE: 0 };

    function evalLine(r, c, dr, dc, p) {
        let count = 1;
        let nr = r + dr, nc = c + dc;
        while (getCell(nr, nc) === p) { count++; nr += dr; nc += dc; }
        const hB = (getCell(nr, nc) !== "" && getCell(nr, nc) !== p);

        nr = r - dr; nc = c - dc;
        while (getCell(nr, nc) === p) { count++; nr -= dr; nc -= dc; }
        const tB = (getCell(nr, nc) !== "" && getCell(nr, nc) !== p);

        if (count >= winCount) {
            // Áp dụng luật chặn 2 đầu cho tất cả winCount
            if (hB && tB) return TL.NONE;
            return TL.FIVE;
        }
        if (count === winCount - 1) {
            if (hB && tB) return TL.NONE;
            return (hB || tB) ? TL.FOUR_BLOCKED : TL.FOUR_OPEN;
        }
        // Chỉ đánh giá THREE_OPEN khi winCount >= 4 (vì với winCount=3, THREE_OPEN chỉ là 1 quân)
        if (count === winCount - 2 && winCount >= 4) {
            if (hB && tB) return TL.NONE;
            return (hB || tB) ? TL.THREE_BLOCKED : TL.THREE_OPEN;
        }
        // Kiểm tra TWO_OPEN cho winCount >= 5
        if (count === winCount - 3 && winCount >= 5) {
            if (hB && tB) return TL.NONE;
            return (hB || tB) ? TL.TWO_BLOCKED : TL.TWO_OPEN;
        }
        return TL.NONE;
    }

    function getSearchCandidates() {
        let cells = [];
        if (isInfinite) {
            let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
            if (infiniteMap.size === 0) return [{ r: 0, c: 0 }];
            
            infiniteMap.forEach((v, k) => {
                const [r, c] = k.split(',').map(Number);
                if (r < minR) minR = r; if (r > maxR) maxR = r;
                if (c < minC) minC = c; if (c > maxC) maxC = c;
            });

            const margin = 2;
            for (let r = minR - margin; r <= maxR + margin; r++) {
                for (let c = minC - margin; c <= maxC + margin; c++) {
                    if (getCell(r, c) === "") {
                        let hasNeighbor = false;
                        for (let dr = -2; dr <= 2; dr++) {
                            for (let dc = -2; dc <= 2; dc++) {
                                if ((dr !== 0 || dc !== 0) && getCell(r + dr, c + dc) !== "") {
                                    hasNeighbor = true;
                                    break;
                                }
                            }
                            if (hasNeighbor) break;
                        }
                        if (hasNeighbor) cells.push({ r, c });
                    }
                }
            }
        } else {
            let hasAny = false;
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (boardState[r][c] !== "") { hasAny = true; break; }
                }
                if (hasAny) break;
            }
            if (!hasAny) return [{ r: Math.floor(boardSize/2), c: Math.floor(boardSize/2) }];

            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (boardState[r][c] === "") {
                        let ok = false;
                        for (let dr = -2; dr <= 2; dr++) {
                            for (let dc = -2; dc <= 2; dc++) {
                                const nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nc >= 0 && nr < boardSize && nc < boardSize && boardState[nr][nc] !== "") {
                                    ok = true; break;
                                }
                            }
                            if (ok) break;
                        }
                        if (ok) cells.push({ r, c });
                    }
                }
            }
        }
        return cells;
    }

    function quickScore(r, c, p) {
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        let score = 0;
        const opp = p === 'X' ? 'O' : 'X';

        // TỰ ĐỘNG TRỪ ĐIỂM NẶNG CHO CÁC Ô ĐÃ TỪNG THUA (BOT LEARNING)
        // Chỉ áp dụng khi đánh giá cho botPiece
        // Giảm điểm trừ để tránh BOT đánh lung tung khi có quá nhiều bài học
        // Kiểm tra cả key cũ và key mới để tương thích
        if (p === botPiece) {
            const oldKey = `r${r}c${c}`;
            const newKey = `${gameMode}_${winCount}_r${r}c${c}`;
            
            if (botDefeatMemory[oldKey] || botDefeatMemory[newKey]) {
                score -= 50000;
                if (!window.isMinimaxRunning) {
                    const usedKey = botDefeatMemory[newKey] ? newKey : oldKey;
                    console.log(`🧠 BOT tránh nước đi đã học: ${usedKey} (điểm sau khi trừ: ${score})`);
                }
            }
        }

        for (const { dr, dc } of dirs) {
            const tTa = evalLine(r, c, dr, dc, p);
            if (tTa === TL.FIVE) score += 100000;
            else if (tTa === TL.FOUR_OPEN) score += 12000;
            else if (tTa === TL.FOUR_BLOCKED) score += 2500;
            else if (tTa === TL.THREE_OPEN) score += 1500;
            else if (tTa === TL.THREE_BLOCKED) score += 300;
            else if (tTa === TL.TWO_OPEN) score += 150;
            else if (tTa === TL.TWO_BLOCKED) score += 20;

            const tDich = evalLine(r, c, dr, dc, opp);
            if (tDich === TL.FIVE) score += 40000;
            else if (tDich === TL.FOUR_OPEN) score += 9000;
            else if (tDich === TL.FOUR_BLOCKED) score += 2000;
            else if (tDich === TL.THREE_OPEN) score += 1000;
            else if (tDich === TL.THREE_BLOCKED) score += 250;
            else if (tDich === TL.TWO_OPEN) score += 80;
        }
        return score;
    }

    function findForkMove(p) {
        const cands = getSearchCandidates();
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        let best = null, maxCount = 1;

        for (const { r, c } of cands) {
            const old = getCell(r, c);
            setCell(r, c, p);
            let openLines = 0;
            for (const { dr, dc } of dirs) {
                const res = evalLine(r, c, dr, dc, p);
                if (res === TL.THREE_OPEN || res === TL.FOUR_OPEN || res === TL.FOUR_BLOCKED) {
                    openLines++;
                }
            }
            setCell(r, c, old);
            if (openLines > maxCount) {
                maxCount = openLines;
                best = { r, c };
            }
        }
        return best;
    }

    // Phát hiện Double Three/Double Four
    function findDoublePattern(p, patternType) {
        const cands = getSearchCandidates();
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        
        // Với winCount < 4, không có THREE_OPEN nên bỏ qua
        if (patternType === 'three' && winCount < 4) return null;
        
        for (const { r, c } of cands) {
            const old = getCell(r, c);
            setCell(r, c, p);
            
            let count = 0;
            for (const { dr, dc } of dirs) {
                const res = evalLine(r, c, dr, dc, p);
                if (patternType === 'three' && res === TL.THREE_OPEN) {
                    count++;
                } else if (patternType === 'four' && (res === TL.FOUR_OPEN || res === TL.FOUR_BLOCKED)) {
                    count++;
                }
            }
            
            setCell(r, c, old);
            
            if (count >= 2) {
                return { r, c, count };
            }
        }
        return null;
    }

    // Tìm fork nâng cao (ưu tiên nhiều đòn cùng lúc)
    function findAdvancedFork(p) {
        const cands = getSearchCandidates();
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        let best = null, maxScore = 0;

        for (const { r, c } of cands) {
            const old = getCell(r, c);
            setCell(r, c, p);
            
            let score = 0;
            let threeCount = 0;
            let fourCount = 0;
            
            for (const { dr, dc } of dirs) {
                const res = evalLine(r, c, dr, dc, p);
                if (res === TL.FIVE) score += 10000;
                else if (res === TL.FOUR_OPEN) { score += 5000; fourCount++; }
                else if (res === TL.FOUR_BLOCKED) { score += 3000; fourCount++; }
                else if (res === TL.THREE_OPEN) { score += 1000; threeCount++; }
                else if (res === TL.THREE_BLOCKED) score += 300;
                else if (res === TL.TWO_OPEN) score += 100;
            }
            
            // Bonus cho fork (nhiều đòn cùng lúc) - chỉ áp dụng khi winCount đủ lớn
            if (winCount >= 4 && threeCount >= 2) score += 2000; // Double Three
            if (fourCount >= 2) score += 5000; // Double Four (hoạt động với mọi winCount)
            if (winCount >= 4 && threeCount >= 1 && fourCount >= 1) score += 3000; // Four-Three
            
            setCell(r, c, old);
            
            if (score > maxScore) {
                maxScore = score;
                best = { r, c };
            }
        }
        return best;
    }

    // Chặn THREE_BLOCKED của địch
    function findBlockThreeBlocked(enemyPiece, myPiece) {
        const cands = getSearchCandidates();
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        
        for (const { r, c } of cands) {
            const old = getCell(r, c);
            setCell(r, c, enemyPiece);
            
            let threeBlockedCount = 0;
            for (const { dr, dc } of dirs) {
                const res = evalLine(r, c, dr, dc, enemyPiece);
                if (res === TL.THREE_BLOCKED) {
                    threeBlockedCount++;
                }
            }
            
            setCell(r, c, old);
            
            // Nếu địch có thể tạo THREE_OPEN từ THREE_BLOCKED
            if (threeBlockedCount >= 1) {
                // Kiểm tra chặn có lợi không
                const blockScore = quickScore(r, c, myPiece);
                if (blockScore > 500) {
                    return { r, c };
                }
            }
        }
        return null;
    }

    // Tìm các pattern nguy hiểm từ lịch sử nước đi
    function findDangerousPatterns(candidates, humanPiece) {
        const dangerousMoves = [];
        const totalMemories = Object.keys(botDefeatMemory).length;
        
        // Nếu có quá nhiều bài học (>50), vô hiệu hóa để tránh BOT đánh lung tung
        if (totalMemories > 50) {
            return dangerousMoves;
        }
        
        // Kiểm tra từng ứng viên xem có tạo pattern nguy hiểm không
        for (const { r, c } of candidates) {
            // Mô phỏng nước đi này
            const oldV = getCell(r, c);
            setCell(r, c, humanPiece);
            
            // Kiểm tra xem có tạo ra pattern giống các nước đi đã từng thua không
            const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
            
            for (const { dr, dc } of dirs) {
                // Tìm tất cả các ô trong đường thẳng
                const cells = [];
                let nr = r, nc = c;
                
                // Tìm về phía trước
                for (let i = 0; i < 5; i++) {
                    if (getCell(nr, nc) === humanPiece || (nr === r && nc === c)) {
                        cells.push({ r: nr, c: nc });
                        nr += dr;
                        nc += dc;
                    } else {
                        break;
                    }
                }
                
                // Tìm về phía sau
                nr = r - dr;
                nc = c - dc;
                for (let i = 0; i < 5; i++) {
                    if (getCell(nr, nc) === humanPiece) {
                        cells.push({ r: nr, c: nc });
                        nr -= dr;
                        nc -= dc;
                    } else {
                        break;
                    }
                }
                
                // Kiểm tra xem có ô nào trong chuỗi này đã từng thua không
                for (const cell of cells) {
                    const memoryKey = `r${cell.r}c${cell.c}`;
                    if (botDefeatMemory[memoryKey]) {
                        dangerousMoves.push({ r, c });
                        break; // Nếu tìm thấy 1 ô nguy hiểm, đánh dấu cả pattern là nguy hiểm
                    }
                }
                
                if (dangerousMoves.some(m => m.r === r && m.c === c)) {
                    break; // Đã tìm thấy pattern nguy hiểm, không cần kiểm tra hướng khác
                }
            }
            
            // Hoàn tác mô phỏng
            setCell(r, c, oldV);
        }
        
        return dangerousMoves;
    }

    // ===== MINIMAX WITH ALPHA-BETA PRUNING =====
    function minimax(depth, alpha, beta, isMaximizing, player, startTime, maxTime) {
        // Kiểm tra timeout
        if (startTime && Date.now() - startTime > maxTime) {
            return 0; // Trả về trung lập khi timeout
        }
        
        // Kiểm tra điều kiện dừng
        if (depth === 0) {
            return evaluateBoard(player);
        }
        
        // Kiểm tra thắng/thua
        const winner = checkBoardWinner();
        if (winner === player) return 1000000 + depth; // Thắng càng nhanh càng tốt
        if (winner !== null) return -1000000 - depth; // Thua càng chậm càng tốt
        
        const candidates = getSearchCandidates();
        if (candidates.length === 0) return 0; // Hòa
        
        // Sắp xếp ứng viên theo điểm heuristic để tối ưu alpha-beta
        candidates.sort((a, b) => quickScore(b.r, b.c, player) - quickScore(a.r, a.c, player));
        
        // Giới hạn số lượng ứng viên để tối ưu hiệu suất
        const maxCandidates = Math.min(candidates.length, depth > 3 ? 6 : 10);
        const searchCandidates = candidates.slice(0, maxCandidates);
        
        if (isMaximizing) {
            let maxEval = -Infinity;
            for (const { r, c } of searchCandidates) {
                const oldV = getCell(r, c);
                setCell(r, c, player);
                
                const evalScore = minimax(depth - 1, alpha, beta, false, player, startTime, maxTime);
                setCell(r, c, oldV);
                
                maxEval = Math.max(maxEval, evalScore);
                alpha = Math.max(alpha, evalScore);
                
                if (beta <= alpha) break; // Beta cutoff
            }
            return maxEval;
        } else {
            let minEval = Infinity;
            const opponent = player === 'X' ? 'O' : 'X';
            
            for (const { r, c } of searchCandidates) {
                const oldV = getCell(r, c);
                setCell(r, c, opponent);
                
                const evalScore = minimax(depth - 1, alpha, beta, true, player, startTime, maxTime);
                setCell(r, c, oldV);
                
                minEval = Math.min(minEval, evalScore);
                beta = Math.min(beta, evalScore);
                
                if (beta <= alpha) break; // Alpha cutoff
            }
            return minEval;
        }
    }

    // Đánh giá bàn cờ cho Minimax
    function evaluateBoard(player) {
        const opponent = player === 'X' ? 'O' : 'X';
        let score = 0;
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        
        // Đánh giá từng ô trống với heuristic nâng cao
        const candidates = getSearchCandidates();
        for (const { r, c } of candidates) {
            // Đánh giá cho người chơi
            const playerScore = enhancedHeuristicScore(r, c, player, dirs);
            // Đánh giá cho đối thủ
            const opponentScore = enhancedHeuristicScore(r, c, opponent, dirs);
            
            // Trừ điểm cho các ô đã học trong bộ nhớ - giảm để tránh BOT né quá nhiều
            // Kiểm tra cả key cũ và key mới để tương thích
            const oldKey = `r${r}c${c}`;
            const newKey = `${gameMode}_${winCount}_r${r}c${c}`;
            if (botDefeatMemory[oldKey] || botDefeatMemory[newKey]) {
                score -= 30000;
            }
            
            score += playerScore - opponentScore * 0.9; // Ưu tiên tấn công nhưng vẫn phòng ngự
        }
        
        // Đánh giá tổng thể bàn cờ cho các pattern nguy hiểm
        score += evaluateBoardPatterns(player, opponent, dirs);
        
        return score;
    }

    // Heuristic scoring nâng cao cho pattern
    function enhancedHeuristicScore(r, c, player, dirs) {
        let score = 0;
        
        for (const { dr, dc } of dirs) {
            const lineEval = evalLine(r, c, dr, dc, player);
            
            // Đánh giá pattern với điểm số chính xác hơn
            switch (lineEval) {
                case TL.FIVE:
                    score += 1000000; // 5 quân - thắng ngay
                    break;
                case TL.FOUR_OPEN:
                    score += 50000; // 4 mở - sắp thắng
                    break;
                case TL.FOUR_BLOCKED:
                    score += 10000; // 4 bị chặn 1 đầu - vẫn nguy hiểm
                    break;
                case TL.THREE_OPEN:
                    score += 5000; // 3 mở - tạo cơ hội
                    break;
                case TL.THREE_BLOCKED:
                    score += 1000; // 3 bị chặn - ít nguy hiểm
                    break;
                case TL.TWO_OPEN:
                    score += 200; // 2 mở - phát triển
                    break;
                case TL.TWO_BLOCKED:
                    score += 50; // 2 bị chặn - rất ít nguy hiểm
                    break;
            }
            
            // Đánh giá thêm cho double pattern - KHÔNG mô phỏng để tránh xung đột
            if (lineEval === TL.THREE_OPEN || lineEval === TL.FOUR_OPEN) {
                // Đếm số hướng có cùng pattern
                let patternCount = 0;
                for (const { dr2, dc2 } of dirs) {
                    if (evalLine(r, c, dr2, dc2, player) === lineEval) {
                        patternCount++;
                    }
                }
                
                if (patternCount >= 2) {
                    score *= 2.5; // Double pattern - rất nguy hiểm
                }
            }
        }
        
        return score;
    }

    // Đánh giá pattern tổng thể trên bàn cờ
    function evaluateBoardPatterns(player, opponent, dirs) {
        let score = 0;
        const candidates = getSearchCandidates();
        
        // Đếm số lượng các pattern nguy hiểm
        let playerFourOpen = 0;
        let playerThreeOpen = 0;
        let opponentFourOpen = 0;
        let opponentThreeOpen = 0;
        
        for (const { r, c } of candidates) {
            if (getCell(r, c) === player) {
                for (const { dr, dc } of dirs) {
                    const eval = evalLine(r, c, dr, dc, player);
                    if (eval === TL.FOUR_OPEN) playerFourOpen++;
                    if (eval === TL.THREE_OPEN) playerThreeOpen++;
                }
            } else if (getCell(r, c) === opponent) {
                for (const { dr, dc } of dirs) {
                    const eval = evalLine(r, c, dr, dc, opponent);
                    if (eval === TL.FOUR_OPEN) opponentFourOpen++;
                    if (eval === TL.THREE_OPEN) opponentThreeOpen++;
                }
            }
        }
        
        // Đánh giá dựa trên số lượng pattern
        score += playerFourOpen * 30000; // 4 mở của người chơi
        score += playerThreeOpen * 5000; // 3 mở của người chơi
        score -= opponentFourOpen * 25000; // 4 mở của đối thủ (phải chặn)
        score -= opponentThreeOpen * 4000; // 3 mở của đối thủ
        
        // Bonus cho nhiều pattern cùng lúc
        if (playerFourOpen >= 2) score += 50000; // Double four mở
        if (playerThreeOpen >= 2) score += 15000; // Double three mở
        
        return score;
    }

    // Kiểm tra người thắng trên bàn cờ (cho Minimax)
    function checkBoardWinner() {
        const candidates = getSearchCandidates();
        for (const { r, c } of candidates) {
            const cell = getCell(r, c);
            if (cell !== '') {
                if (checkWinSilent(r, c)) {
                    return cell;
                }
            }
        }
        return null;
    }

    // Tìm nước đi tốt nhất bằng Minimax
    function getBestMoveWithMinimax(depth, player) {
        const candidates = getSearchCandidates();
        if (candidates.length === 0) return { r: 0, c: 0 };
        
        let bestMove = candidates[0];
        let bestScore = -Infinity;
        
        // Sắp xếp ứng viên theo điểm heuristic
        candidates.sort((a, b) => quickScore(b.r, b.c, player) - quickScore(a.r, a.c, player));
        
        // Giới hạn ứng viên để tránh lag - giảm từ 12 xuống 8
        const maxCandidates = Math.min(candidates.length, 8);
        const searchCandidates = candidates.slice(0, maxCandidates);
        
        // Thêm timeout để tránh treo
        const startTime = Date.now();
        const maxTime = 3000; // 3 giây tối đa
        
        // Đánh dấu Minimax đang chạy để tránh spam console
        window.isMinimaxRunning = true;
        
        for (const { r, c } of searchCandidates) {
            // Kiểm tra timeout
            if (Date.now() - startTime > maxTime) {
                console.log('⏱️ Minimax timeout, trả về nước đi tốt nhất hiện tại');
                break;
            }
            
            const oldV = getCell(r, c);
            setCell(r, c, player);
            
            const score = minimax(depth - 1, -Infinity, Infinity, false, player, startTime, maxTime);
            setCell(r, c, oldV);
            
            if (score > bestScore) {
                bestScore = score;
                bestMove = { r, c };
            }
        }
        
        window.isMinimaxRunning = false;
        return bestMove;
    }

    function getBotMove() {
        const cands = getSearchCandidates();
        if (cands.length === 0) return { r: 0, c: 0 };

        const bp = botPiece;
        const hp = humanPiece;
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];

        // Cập nhật trạng thái thinking
        updateBotThinking('Hmm, để tôi xem bàn cờ...');
        
        // 0. ƯU TIÊN CAO NHẤT: CHẶN ĐỊCH THẮNG LẬP TỨC (sử dụng checkWinSilent để tuân thủ luật chặn 2 đầu)
        // KIỂM TRA TRƯỚC KHI ÁP DỤNG BẤT KỲ LOGIC KHÁC
        let mustBlock = false;
        let blockMove = null;
        
        for (const { r, c } of cands) {
            setCell(r, c, hp);
            if (checkWinSilent(r, c)) {
                mustBlock = true;
                blockMove = { r, c };
                setCell(r, c, "");
                break;
            }
            setCell(r, c, "");
        }
        
        if (mustBlock) {
            // Chọn vị trí chặn tốt nhất nếu có nhiều lựa chọn
            let bestBlock = blockMove, bestScore = -Infinity;
            for (const { r, c } of cands) {
                setCell(r, c, hp);
                if (checkWinSilent(r, c)) {
                    const score = quickScore(r, c, bp);
                    if (score > bestScore) {
                        bestScore = score;
                        bestBlock = { r, c };
                    }
                }
                setCell(r, c, "");
            }
            updateBotThinking('PHẢI CHẶN! Địch sắp thắng! 🛡️');
            return bestBlock;
        }

        // 1. TÌM NƯỚC THẮNG LẬP TỨC CHO BOT (sử dụng checkWinSilent để tuân thủ luật chặn 2 đầu)
        for (const { r, c } of cands) {
            setCell(r, c, bp);
            if (checkWinSilent(r, c)) {
                setCell(r, c, "");
                updateBotThinking('Hmm, có vẻ tốt đấy! 🎯');
                return { r, c };
            }
            setCell(r, c, "");
        }

        // 2. CHẶN ĐỊCH TẠO FOUR_OPEN (4 quân mở - cực kỳ nguy hiểm) - ƯU TIÊN CAO
        updateBotThinking('Kiểm tra địch tạo 4 mở...');
        let blockFourOpen = null;
        for (const { r, c } of cands) {
            const oldV = getCell(r, c);
            setCell(r, c, hp);
            
            // Kiểm tra xem có tạo FOUR_OPEN không
            const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
            for (const { dr, dc } of dirs) {
                if (evalLine(r, c, dr, dc, hp) === TL.FOUR_OPEN) {
                    blockFourOpen = { r, c };
                    break;
                }
            }
            
            setCell(r, c, oldV);
            if (blockFourOpen) break;
        }
        
        if (blockFourOpen) {
            updateBotThinking('Chặn 4 mở! ⚠️');
            return blockFourOpen;
        }

        // 3. CHẶN ĐỊCH TẠO THREE_OPEN (3 quân mở - nguy hiểm) - ƯU TIÊN CAO
        // Với winCount=3, THREE_OPEN không có nghĩa, thay vào đó chặn TWO_OPEN
        if (winCount >= 4) {
            updateBotThinking('Kiểm tra địch tạo 3 mở...');
            let blockThreeOpen = null;
            let maxThreeOpenScore = -Infinity;
            
            for (const { r, c } of cands) {
                const oldV = getCell(r, c);
                setCell(r, c, hp);
                
                // Đếm số THREE_OPEN
                let threeOpenCount = 0;
                const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
                for (const { dr, dc } of dirs) {
                    if (evalLine(r, c, dr, dc, hp) === TL.THREE_OPEN) {
                        threeOpenCount++;
                    }
                }
                
                // Nếu có 2+ THREE_OPEN (double three) - cực kỳ nguy hiểm
                if (threeOpenCount >= 2) {
                    const score = quickScore(r, c, bp);
                    if (score > maxThreeOpenScore) {
                        maxThreeOpenScore = score;
                        blockThreeOpen = { r, c };
                    }
                }
                
                setCell(r, c, oldV);
            }
            
            if (blockThreeOpen) {
                updateBotThinking('Chặn double 3 mở! 🔥');
                return blockThreeOpen;
            }
        } else if (winCount === 3) {
            // Với winCount=3, chặn TWO_OPEN (2 quân mở) vì lượt sau địch sẽ thắng
            updateBotThinking('Kiểm tra địch tạo 2 mở (winCount=3)...');
            let blockTwoOpen = null;
            
            for (const { r, c } of cands) {
                const oldV = getCell(r, c);
                setCell(r, c, hp);
                
                const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
                for (const { dr, dc } of dirs) {
                    if (evalLine(r, c, dr, dc, hp) === TL.TWO_OPEN) {
                        blockTwoOpen = { r, c };
                        break;
                    }
                }
                
                setCell(r, c, oldV);
                if (blockTwoOpen) break;
            }
            
            if (blockTwoOpen) {
                updateBotThinking('Chặn 2 mở! ⚠️');
                return blockTwoOpen;
            }
        }

        // 4. KIỂM TRA PATTERN NGUY HIỂM TỪ LỊCH SỬ NƯỚC ĐI
        // Chỉ áp dụng sau khi đã đảm bảo không cần chặn
        const dangerousPatterns = findDangerousPatterns(cands, hp);
        if (dangerousPatterns.length > 0) {
            // Loại bỏ các ứng viên có pattern nguy hiểm
            const safeCands = cands.filter(cand => 
                !dangerousPatterns.some(dp => dp.r === cand.r && dp.c === cand.c)
            );
            if (safeCands.length > 0) {
                // Ưu tiên các ứng viên an toàn
                cands.splice(0, cands.length, ...safeCands);
                updateBotThinking('Nhận diện pattern nguy hiểm! 🧠');
            }
        }

        // 5. NẾU CHẾ ĐỘ THƯỜNG / DỄ, CHỈ CẦN QUYẾT ĐỊNH THEO QUICK SCORE THAM LAM
        if (gameMode === 'ai-easy') {
            cands.sort((a, b) => quickScore(b.r, b.c, bp) - quickScore(a.r, a.c, bp));
            const idx = Math.min(cands.length - 1, Math.floor(Math.random() * 3));
            return cands[idx];
        }
        if (gameMode === 'ai-medium') {
            let best = cands[0], maxS = -Infinity;
            for (const c of cands) {
                const s = quickScore(c.r, c.c, bp);
                if (s > maxS) { maxS = s; best = c; }
            }
            return best;
        }

        // 4. BOT TẠO NƯỚC BỐN MỞ (FOUR_OPEN) ĐỂ CHỦ ĐỘNG TẤN CÔNG - ƯU TIÊN TẤN CÔNG KHI CÓ CƠ HỘI
        updateBotThinking('Đang tìm cơ hội tấn công...');
        for (const { r, c } of cands) {
            for (const { dr, dc } of dirs) {
                if (evalLine(r, c, dr, dc, bp) === TL.FOUR_OPEN) {
                    updateBotThinking('Cơ hội tốt! Đi thôi! ⚔️');
                    return { r, c };
                }
            }
        }

        // 5. CHẶN ĐỊCH CÓ NƯỚC BỐN MỞ (FOUR_OPEN) - CHỈ CHẶN KHI ĐỊCH CŨNG NGUY HIỂM
        for (const { r, c } of cands) {
            for (const { dr, dc } of dirs) {
                if (evalLine(r, c, dr, dc, hp) === TL.FOUR_OPEN) {
                    updateBotThinking('Đã chặn kịp thời! 😅 hú vía chim én');
                    return { r, c };
                }
            }
        }

        // 5.5. CHẶN DOUBLE THREE/DOUBLE FOUR CỦA ĐỊCH (chế độ god/hard)
        if (gameMode === 'ai-god' || gameMode === 'ai-hard') {
            const enemyDoubleThree = findDoublePattern(hp, 'three');
            if (enemyDoubleThree) {
                updateBotThinking('Phải chặn Double Three! 🎯');
                // Chặn ở vị trí tạo Double Three
                const blockMove = findBlockThreeBlocked(hp, bp);
                if (blockMove) return blockMove;
            }
            
            const enemyDoubleFour = findDoublePattern(hp, 'four');
            if (enemyDoubleFour) {
                updateBotThinking('Phải chặn Double Four! 🚨');
                // Chặn ở vị trí tạo Double Four
                const blockMove = findBlockThreeBlocked(hp, bp);
                if (blockMove) return blockMove;
            }
        }

        // 6. LUẬT CHẶN LUẬT CHƠI ĐẶC BIỆT KHI CÓ CHUỖI 4 BỊ CHẶN 1 ĐẦU (FOUR_BLOCKED)
        const opp2 = hp;
        let cands2 = [];
        for (const pt of cands) {
            const s = quickScore(pt.r, pt.c, bp);
            cands2.push({ ...pt, score: s });
        }
        cands2.sort((a, b) => b.score - a.score);
        const searchCount = Math.min(cands2.length, gameMode === 'ai-god' ? 18 : 10);

        for (let i = 0; i < searchCount; i++) {
            const { r, c } = cands2[i];
            const oldV = getCell(r, c);
            setCell(r, c, hp);
            // Sử dụng checkWinSilent để tuân thủ luật chặn 2 đầu
            if (checkWinSilent(r, c)) {
                for (const { dr, dc } of dirs) {
                    let cells = [{ r, c }];
                    let nr = r + dr, nc = c + dc;
                    while (getCell(nr, nc) === hp) { cells.push({ r: nr, c: nc }); nr += dr; nc += dc; }
                    let headR = nr, headC = nc;
                    let headBlocked = (getCell(nr, nc) !== "" && getCell(nr, nc) !== hp);

                    nr = r - dr; nc = c - dc;
                    while (getCell(nr, nc) === hp) { cells.push({ r: nr, c: nc }); nr -= dr; nc -= dc; }
                    let tailR = nr, tailC = nc;
                    let tailBlocked = (getCell(nr, nc) !== "" && getCell(nr, nc) !== hp);

                    if (cells.length >= winCount) {
                        let blockCells = [];
                        // Tìm tất cả các vị trí chặn có thể ở cả 2 đầu
                        // Đầu bên phải (head)
                        let headDist = 0;
                        while (headDist <= 3) {
                            const blockR = headR + headDist * dr, blockC = headC + headDist * dc;
                            if (getCell(blockR, blockC) === "") {
                                // Tìm thấy vị trí trống, kiểm tra an toàn
                                let safe = true;
                                for (let checkDist = 1; checkDist <= 2; checkDist++) {
                                    const checkR = blockR + checkDist * dr, checkC = blockC + checkDist * dc;
                                    if (getCell(checkR, checkC) === hp) {
                                        safe = false;
                                        break;
                                    }
                                }
                                if (safe) {
                                    const blockScore = quickScore(blockR, blockC, bp);
                                    const distPenalty = headDist * 500;
                                    const totalScore = blockScore - distPenalty;
                                    blockCells.push({ r: blockR, c: blockC, priority: headDist, score: totalScore });
                                }
                                break; // Chỉ chặn ở vị trí trống gần nhất
                            } else if (getCell(blockR, blockC) === bp) {
                                // Đã có quân bot ở đây, không thể chặn
                                break;
                            }
                            headDist++;
                        }
                        
                        // Đầu bên trái (tail)
                        let tailDist = 0;
                        while (tailDist <= 3) {
                            const blockR = tailR - tailDist * dr, blockC = tailC - tailDist * dc;
                            if (getCell(blockR, blockC) === "") {
                                // Tìm thấy vị trí trống, kiểm tra an toàn
                                let safe = true;
                                for (let checkDist = 1; checkDist <= 2; checkDist++) {
                                    const checkR = blockR - checkDist * dr, checkC = blockC - checkDist * dc;
                                    if (getCell(checkR, checkC) === hp) {
                                        safe = false;
                                        break;
                                    }
                                }
                                if (safe) {
                                    const blockScore = quickScore(blockR, blockC, bp);
                                    const distPenalty = tailDist * 500;
                                    const totalScore = blockScore - distPenalty;
                                    blockCells.push({ r: blockR, c: blockC, priority: tailDist, score: totalScore });
                                }
                                break; // Chỉ chặn ở vị trí trống gần nhất
                            } else if (getCell(blockR, blockC) === bp) {
                                // Đã có quân bot ở đây, không thể chặn
                                break;
                            }
                            tailDist++;
                        }
                        
                        if (blockCells.length > 0) {
                            setCell(r, c, oldV);
                            // Sắp xếp theo điểm cao nhất, nếu điểm tương đương thì chọn dist nhỏ nhất
                            blockCells.sort((a, b) => {
                                if (b.score !== a.score) return b.score - a.score;
                                return a.priority - b.priority;
                            });
                            return blockCells[0];
                        }
                    }
                }
            }
            setCell(r, c, oldV);
        }

        // 7. BOT TẠO BA MỞ (THREE_OPEN) ĐỂ GÂY ÁP LỰC ĐỒNG THỜI VÀO PHUƠNG ÁN PHÂN NHÁNH (FORK ATTACK)
        // Chỉ áp dụng khi winCount >= 4 (vì với winCount=3, THREE_OPEN không có nghĩa)
        // Với winCount=3, ưu tiên tạo TWO_OPEN (2 quân mở) vì lượt sau sẽ thắng
        if (winCount >= 4) {
            for (const { r, c } of cands2) {
                const ov = getCell(r, c);
                setCell(r, c, bp);
                for (const { dr, dc } of dirs) {
                    if (evalLine(r, c, dr, dc, bp) === TL.THREE_OPEN) {
                        setCell(r, c, ov);
                        updateBotThinking('cơ hội thắng 🔥');
                        return { r, c };
                    }
                }
                setCell(r, c, ov);
            }
        } else if (winCount === 3) {
            // Với winCount=3, ưu tiên tạo TWO_OPEN (2 quân mở)
            for (const { r, c } of cands2) {
                const ov = getCell(r, c);
                setCell(r, c, bp);
                for (const { dr, dc } of dirs) {
                    if (evalLine(r, c, dr, dc, bp) === TL.TWO_OPEN) {
                        setCell(r, c, ov);
                        updateBotThinking('Tạo 2 mở (winCount=3) 🔥');
                        return { r, c };
                    }
                }
                setCell(r, c, ov);
            }
        }

        // 7.5. BOT TẠO DOUBLE THREE/DOUBLE FOUR (chế độ god/hard)
        if (gameMode === 'ai-god' || gameMode === 'ai-hard') {
            const botDoubleThree = findDoublePattern(bp, 'three');
            if (botDoubleThree) {
                updateBotThinking('Tạo Double Three! ⚡');
                return { r: botDoubleThree.r, c: botDoubleThree.c };
            }
            
            const botDoubleFour = findDoublePattern(bp, 'four');
            if (botDoubleFour) {
                updateBotThinking('Tạo Double Four! 💥');
                return { r: botDoubleFour.r, c: botDoubleFour.c };
            }
        }

        // 7.6. CHẶN THREE_BLOCKED CỦA ĐỊCH (chế độ god/hard)
        if (gameMode === 'ai-god' || gameMode === 'ai-hard') {
            const blockThreeBlocked = findBlockThreeBlocked(hp, bp);
            if (blockThreeBlocked) {
                updateBotThinking('Chặn THREE_BLOCKED! 🛡️');
                return blockThreeBlocked;
            }
        }

        // 8. TÌM KIẾM NƯỚC ĐI TẠO THẾ GỌNG KÌM PHÂN NHÁNH (FORK ATTACK) - nâng cao
        if (gameMode === 'ai-god' || gameMode === 'ai-hard') {
            const advancedFork = findAdvancedFork(bp);
            if (advancedFork) {
                updateBotThinking('Tìm fork nâng cao! 🚀');
                return advancedFork;
            }
        }
        
        // 8.5. Fork cơ bản (cho chế độ medium/easy)
        const botFork = findForkMove(bp);
        const xFork = findForkMove(hp);
        if (xFork && botFork) {
            return quickScore(xFork.r, xFork.c, hp) > quickScore(botFork.r, botFork.c, bp) * 1.2 ? xFork : botFork;
        }
        if (xFork) {
            updateBotThinking('Phải chặn fork của địch! 🎯');
            return xFork;
        }
        if (botFork) {
            updateBotThinking('Tuyệt! Tìm thấy fork tấn công! 🚀');
            return botFork;
        }

        // 9. MINIMAX WITH ALPHA-BETA PRUNING (chế độ God và Hard)
        if (gameMode === 'ai-god' || gameMode === 'ai-hard') {
            updateBotThinking('Đang tính toán sâu... 🧠');
            // Độ sâu tìm kiếm theo chế độ và winCount
            let depth;
            if (gameMode === 'ai-god') {
                depth = moveCount < 20 ? 4 : 3;
            } else {
                // Hard mode: độ sâu thấp hơn
                depth = moveCount < 20 ? 3 : 2;
            }
            // Giảm độ sâu cho winCount nhỏ (game nhanh hơn)
            if (winCount <= 4) depth = Math.max(1, depth - 1);
            
            const minimaxMove = getBestMoveWithMinimax(depth, bp);
            if (minimaxMove) {
                updateBotThinking('Minimax đã tìm ra nước đi! ⚡');
                return minimaxMove;
            }
        }

        return cands2[0];
    }

    function updateBotThinking(message) {
        if (statusPanel) {
            statusPanel.innerHTML = `🤖 <span style="opacity:0.7">${message}</span> <span class="think-dots">...</span>`;
        }
        // Hiển thị vào bot avatar
        const botMessage = document.getElementById('bot-message');
        if (botMessage) {
            botMessage.textContent = message;
        }
    }

    // Đánh giá tổng thể bàn cờ của người chơi
    function evaluateOverallBoardDanger(playerPiece) {
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        let fiveCount = 0;
        let fourOpenCount = 0;
        let fourBlockedCount = 0;
        let threeOpenCount = 0;
        let threeBlockedCount = 0;
        let twoOpenCount = 0;
        
        // Quét toàn bộ bàn cờ
        const cands = getSearchCandidates();
        for (const { r, c } of cands) {
            if (getCell(r, c) === playerPiece) {
                for (const { dr, dc } of dirs) {
                    const res = evalLine(r, c, dr, dc, playerPiece);
                    if (res === TL.FIVE) fiveCount++;
                    else if (res === TL.FOUR_OPEN) fourOpenCount++;
                    else if (res === TL.FOUR_BLOCKED) fourBlockedCount++;
                    else if (res === TL.THREE_OPEN) threeOpenCount++;
                    else if (res === TL.THREE_BLOCKED) threeBlockedCount++;
                    else if (res === TL.TWO_OPEN) twoOpenCount++;
                }
            }
        }
        
        // Tính điểm nguy hiểm tổng thể
        let overallDanger = 0;
        overallDanger += fiveCount * 15;           // FIVE rất nguy hiểm
        overallDanger += fourOpenCount * 8;        // FOUR_OPEN nguy hiểm
        overallDanger += fourBlockedCount * 3;     // FOUR_BLOCKED trung bình
        overallDanger += threeOpenCount * 2;      // THREE_OPEN nhẹ
        overallDanger += threeBlockedCount * 1;   // THREE_BLOCKED rất nhẹ
        overallDanger += twoOpenCount * 0.5;       // TWO_OPEN rất nhẹ
        
        // Bonus cho fork (nhiều đòn cùng lúc)
        if (fourOpenCount >= 2) overallDanger += 10;  // Double Four
        if (threeOpenCount >= 2) overallDanger += 5;   // Double Three
        if (fourOpenCount >= 1 && threeOpenCount >= 1) overallDanger += 7; // Four-Three
        
        return {
            overallDanger,
            fiveCount,
            fourOpenCount,
            fourBlockedCount,
            threeOpenCount,
            threeBlockedCount,
            twoOpenCount
        };
    }

    function evaluatePlayerMove(r, c) {
        const hp = humanPiece;
        const bp = botPiece;
        const dirs = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }, { dr: 1, dc: -1 }];
        
        // Đánh giá nước đi của người chơi
        const playerScore = quickScore(r, c, hp);
        
        // Tìm nước đi tốt nhất mà bot sẽ chọn
        const cands = getSearchCandidates();
        let bestBotScore = -Infinity;
        for (const cand of cands) {
            const score = quickScore(cand.r, cand.c, bp);
            if (score > bestBotScore) bestBotScore = score;
        }
        
        // Đánh giá chất lượng nước đi
        let message = '';
        let emoji = '';
        
        // Đánh giá tổng thể bàn cờ
        const boardDanger = evaluateOverallBoardDanger(hp);
        
        // Kiểm tra nước đi có tạo đòn nguy hiểm không
        let hasThreat = false;
        let currentDangerScore = 0;
        for (const { dr, dc } of dirs) {
            const tTa = evalLine(r, c, dr, dc, hp);
            if (tTa === TL.FIVE) {
                hasThreat = true;
                currentDangerScore += 10;
            } else if (tTa === TL.FOUR_OPEN) {
                hasThreat = true;
                currentDangerScore += 5;
            } else if (tTa === TL.THREE_OPEN && winCount >= 4) {
                // Chỉ tính THREE_OPEN khi winCount >= 4
                currentDangerScore += 2;
            }
        }
        
        // Cộng dồn điểm nguy hiểm (kết hợp tổng thể bàn cờ)
        playerDangerScore += currentDangerScore + (boardDanger.overallDanger * 0.1);
        
        // Kiểm tra nước đi có chặn bot không
        let blocksBot = false;
        for (const { dr, dc } of dirs) {
            const tDich = evalLine(r, c, dr, dc, bp);
            if (tDich === TL.FOUR_OPEN || tDich === TL.FIVE) {
                blocksBot = true;
                break;
            }
        }
        
        // Lời thoại vui nhộn & linh hoạt
        const excellentMoves = [
            'Ui da! Đã đọc được nước cờ này rồi nhé, lần sau tôi sẽ rút kinh nghiệm! 🧠',
            'Wow! Nước đi này quá đỉnh! Tôi phải ghi nhớ lại! 📝',
            'Chất lượng! Nước đi này khiến tôi phải suy nghĩ lại! 🤔',
            'Xuất sắc! Bạn đã tìm được điểm yếu của tôi! 💡',
            'Đáng sợ! Nước đi này rất nguy hiểm! 😱'
        ];
        
        const dangerousMoves = [
            'Uầy! Nước đi nguy hiểm quá! 😱',
            'Cẩn thận! Đòn này rất mạnh! ⚠️',
            'Ác thật! Bạn đang tạo áp lực lớn! 😰',
            'Gớm! Nước này khiến tôi lo lắng! 😨',
            'Nghệ thuật! Nước đi rất cá tính! 🎨'
        ];
        
        const blockMessages = [
            'Chặn khéo léo đấy! 👏',
            'Khá lắm! Đã chặn được nước của tôi! 🛡️',
            'Thông minh! Bạn biết cách phòng thủ! 🧠',
            'Hay! Chặn đúng chỗ! 🎯',
            'Khôn khéo! Không dễ gì đánh bại bạn! 😏'
        ];
        
        const goodMoves = [
            'Wow! Nước đi xuất sắc! 🌟',
            'Tốt! Cố lên! 😊',
            'Khá! Tiếp tục nhé! 👍',
            'Được! Nước đi ổn! ✅',
            'Không tệ! Cố gắng hơn! 💪'
        ];
        
        const averageMoves = [
            'Bình thường, có thể tốt hơn 🤔',
            'Cơ bản! Cần sáng tạo hơn! 🤷',
            'Được thôi! Nhưng chưa đủ! 😐',
            'Tạm ổn! Cần chiến thuật! 📋',
            'Vừa phải! Cải thiện đi! 🔄'
        ];
        
        const poorMoves = [
            'Hmm, nước đi này chưa tối ưu lắm 😅',
            'Thôi! Cần suy nghĩ kỹ hơn! 🤔',
            'Tệ! Đừng đi như thế! 😅',
            'Không! Nước này không tốt! 🙅',
            'Lỗi! Cần thay đổi chiến thuật! ❌'
        ];
        
        if (hasThreat && currentDangerScore >= 5) {
            // Nước đi rất nguy hiểm - chọn ngẫu nhiên từ danh sách
            message = dangerousMoves[Math.floor(Math.random() * dangerousMoves.length)];
            emoji = '⚠️';
        } else if (playerScore > bestBotScore * 0.9) {
            // Nước đi xuất sắc - chọn ngẫu nhiên từ danh sách
            message = excellentMoves[Math.floor(Math.random() * excellentMoves.length)];
            emoji = '🌟';
        } else if (blocksBot) {
            message = blockMessages[Math.floor(Math.random() * blockMessages.length)];
            emoji = '🛡️';
        } else if (playerScore > bestBotScore * 0.8) {
            message = goodMoves[Math.floor(Math.random() * goodMoves.length)];
            emoji = '👍';
        } else if (playerScore > bestBotScore * 0.5) {
            message = goodMoves[Math.floor(Math.random() * goodMoves.length)];
            emoji = '😊';
        } else if (playerScore > bestBotScore * 0.3) {
            message = averageMoves[Math.floor(Math.random() * averageMoves.length)];
            emoji = '🤔';
        } else {
            message = poorMoves[Math.floor(Math.random() * poorMoves.length)];
            emoji = '💭';
        }
        
        // Hiển thị đánh giá (hiển thị ngắn gọn trong status panel)
        setTimeout(() => {
            if (statusPanel && isGameActive) {
                statusPanel.innerHTML = `${emoji} ${message}`;
            }
            // Hiển thị vào bot avatar
            const botMessage = document.getElementById('bot-message');
            if (botMessage) {
                botMessage.textContent = message;
            }
        }, 500);
        
        // Lưu đánh giá để hiển thị chi tiết sau khi bot đi
        window.lastPlayerEvaluation = { message, emoji, playerScore, bestBotScore };
    }
    // ===== PHÁO HOA =====
    let confettiCanvas = null;
    let ctx = null;
    let confettiParticles = [];
    let confettiRaf = null;

    function initConfetti() {
        confettiCanvas = document.getElementById('confetti-canvas');
        if (confettiCanvas) {
            ctx = confettiCanvas.getContext('2d');
            resizeConfettiCanvas();
        }
    }

    function resizeConfettiCanvas() {
        if (!confettiCanvas) return;
        confettiCanvas.width  = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeConfettiCanvas);

    function randomColor() {
        const colors = ['#f59e0b','#ef4444','#3b82f6','#10b981','#a855f7','#ec4899','#facc15','#ffffff'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function spawnConfetti(count = 160) {
        for (let i = 0; i < count; i++) {
            confettiParticles.push({
                x:      Math.random() * confettiCanvas.width,
                y:      Math.random() * confettiCanvas.height - confettiCanvas.height,
                w:      Math.random() * 10 + 5,
                h:      Math.random() * 6 + 3,
                color:  randomColor(),
                rot:    Math.random() * Math.PI * 2,
                rotV:   (Math.random() - 0.5) * 0.15,
                vx:     (Math.random() - 0.5) * 3,
                vy:     Math.random() * 4 + 2,
                alpha:  1,
                decay:  Math.random() * 0.005 + 0.003
            });
        }
    }

    function animateConfetti() {
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        confettiParticles = confettiParticles.filter(p => p.alpha > 0.02);

        for (let p of confettiParticles) {
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();

            p.x   += p.vx;
            p.y   += p.vy;
            p.rot += p.rotV;
            p.vy  += 0.08; // gravity
            p.alpha -= p.decay;
        }

        if (confettiParticles.length > 0) {
            confettiRaf = requestAnimationFrame(animateConfetti);
        } else {
            ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        }
    }

    function startConfetti() {
        if (confettiRaf) cancelAnimationFrame(confettiRaf);
        confettiParticles = [];
        // Bắn 3 loạt liên tiếp cho hoành tráng
        spawnConfetti(180);
        setTimeout(() => spawnConfetti(150), 400);
        setTimeout(() => spawnConfetti(120), 900);
        animateConfetti();
    }

    function stopConfetti() {
        if (confettiRaf) cancelAnimationFrame(confettiRaf);
        confettiRaf = null;
        confettiParticles = [];
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }

    function showWinOverlay(winner, isBotWin, tauntMessage = '', tauntEmoji = '') {
        const overlay  = document.getElementById('win-overlay');
        const emojiEl  = document.getElementById('win-emoji');
        const titleEl  = document.getElementById('win-title');
        const subEl    = document.getElementById('win-subtitle');

        if (gameMode === 'solo') {
            emojiEl.textContent = '🏆';
            titleEl.textContent = `NGƯỜI ${winner} CHIẾN THẮNG!`;
            titleEl.style.color = winner === 'X' ? '#2563eb' : '#dc2626';
            subEl.textContent   = `Người ${winner} đã giành chiến thắng ván này.`;
            startConfetti();
        } else if (isBotWin) {
            emojiEl.textContent  = tauntEmoji || 'THUA ĐẬM 💀';
            titleEl.textContent  = 'rất cố gắn , cần tu luyện thêm!';
            titleEl.style.color  = '#ef4444';
            subEl.textContent    = tauntMessage || 'Gừng càng già càng cay — bó tay thì gặp anh Chần!';
        } else {
            emojiEl.textContent  = '🏆';
            titleEl.textContent  = 'CHIẾN THẮNG!';
            titleEl.style.color  = '#f59e0b';
            
            // Tính thứ hạng dự kiến trong BXH
            const rankData = loadRank();
            const currentKey = getRankKey(gameMode, winCount, '♾️ Vô Hạn');
            const currentEntries = rankData[currentKey] || [];
            
            // Tạo entry tạm thời cho ván thắng này
            const tempEntry = {
                name: pendingRankEntry?.name || 'Bạn',
                score: pendingRankEntry?.score || 0,
                wins: 1
            };
            
            // Thêm entry tạm vào danh sách để tính thứ hạng
            const tempEntries = [...currentEntries, tempEntry];
            tempEntries.sort((a, b) => (b.score || 0) - (a.score || 0));
            
            // Tìm thứ hạng của entry tạm
            let playerRank = null;
            for (let i = 0; i < tempEntries.length; i++) {
                if (tempEntries[i] === tempEntry) {
                    playerRank = i + 1;
                    break;
                }
            }
            
            let rankMessage = 'Bạn đã hạ gục BOT M2 . Bái phục!, chờ anh đẻ ra con M2 đã nha';
            if (playerRank !== null) {
                const medals = ['🥇', '🥈', '🥉'];
                const medal = medals[playerRank - 1] || `#${playerRank}`;
                const score = tempEntry.score.toLocaleString('vi-VN');
                rankMessage = `🏅 Thứ hạng: ${medal} · Điểm: ${score}`;
            }
            
            subEl.textContent    = rankMessage;
            startConfetti();
        }

        overlay.classList.add('show');
    }

    function closeWinAndRestart() {
        document.getElementById('win-overlay').classList.remove('show');
        stopConfetti();
        initGame();
    }

    function reviewGame() {
        document.getElementById('win-overlay').classList.remove('show');
        stopConfetti();
        if (isInfinite && winningCellCoords.length > 0) {
            const [wr, wc] = winningCellCoords[Math.floor(winningCellCoords.length / 2)];
            vRowF = wr - (infCanvasH / INF_CS) / 2;
            vColF = wc - (infCanvasW / INF_CS) / 2;
            renderInfiniteBoard();
        }
        statusPanel.innerHTML = `⬆️ Đang xem lại ván đấu &nbsp;|&nbsp; <button onclick="closeWinAndRestart()" style="padding:4px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:bold;font-size:0.9rem;">🔄 Đấu Lại</button>`;
    }

    changeTheme();
    autoLoadBotMemory(); // Tự động nạp bộ não từ file Bo_Nao_BOT.html nếu có
    initGame();
    renderRankPanel();
    renderHistory();
    applyHistoryTheme(document.getElementById('theme-select').value);
    setupNameInputListener();
    initConfetti();
    
    // Load block-both-ends setting
    document.getElementById('block-both-ends').checked = loadBlockBothEndsSetting();
    applyPanelSizes();
    setupPanelResize();

    // Load rank + history từ server (merge vào localStorage nếu có)
    (async () => {
        const serverRank = await apiGet('/api/rank');
        if (serverRank) {
            const local = loadRank();
            const merged = { ...local, ...serverRank };
            saveRank(merged);
            renderRankPanel();
        }
        const serverHistory = await apiGet('/api/history');
        if (serverHistory && Array.isArray(serverHistory)) {
            const local = loadHistory();
            const merged = [...serverHistory, ...local].slice(0, MAX_HISTORY);
            saveHistory(merged);
            matchHistory = merged;
            renderHistory();
        }
    })();
